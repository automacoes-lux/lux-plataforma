<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lux Music</title>

<style>
:root{
  --gold:#C9A84C;--gold-bright:#E2BA5F;--gold-dim:#9A7A38;
  --bg:#0A0A0B;--bg2:#111114;--bg3:#18181C;--bg4:#1F1F25;
  --border:rgba(201,168,76,.15);--border-bright:rgba(201,168,76,.35);
  --text:#E8E4DC;--text-dim:#8A8680;--text-muted:#4A4844;
  --radius:10px;--radius-lg:16px;--shadow:0 8px 32px rgba(0,0,0,.6);
  --green:#7FB87A;--red:#E87A7A;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Helvetica Neue',Arial,sans-serif;font-size:15px}

.app{display:flex;min-height:100vh}

/* ═══ SIDEBAR HISTÓRICO ═══════════════════════════════ */
.sidebar{
  width:260px;flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;position:sticky;top:0;
}
.sidebar-head{
  padding:18px 14px 12px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:10px;
}
.sidebar-title{
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  color:var(--gold-dim);letter-spacing:.04em;text-transform:uppercase;
}
.search-wrap{position:relative}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);pointer-events:none}
.search-input{
  width:100%;padding:8px 12px 8px 32px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-size:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;outline:none;transition:border .15s;
}
.search-input:focus{border-color:var(--border-bright)}
.search-input::placeholder{color:var(--text-muted)}
.hist-list{flex:1;overflow-y:auto;padding:8px}
.hist-empty{padding:28px 12px;text-align:center;font-size:12px;color:var(--text-muted);line-height:1.7}
.hist-item{
  padding:10px 12px;border-radius:var(--radius);border:1px solid transparent;
  cursor:pointer;margin-bottom:3px;transition:all .15s;
}
.hist-item:hover{background:var(--bg3);border-color:var(--border)}
.hist-item.active{background:rgba(201,168,76,.08);border-color:var(--border-bright)}
.hi-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-meta{display:flex;gap:6px;align-items:center;font-size:10px;color:var(--text-muted)}
.hi-tag{
  font-size:9px;padding:2px 7px;border-radius:20px;
  background:rgba(201,168,76,.1);color:var(--gold-dim);
  border:1px solid rgba(201,168,76,.2);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:90px;
}

/* ═══ MAIN ═══════════════════════════════════════════ */
.main{flex:1;overflow-y:auto;padding:0}

/* TOPO */
.topbar{
  padding:20px 40px 0;display:flex;align-items:center;gap:14px;
  margin-bottom:32px;
}
.top-logo{width:40px;height:40px;border-radius:50%;border:1px solid var(--border-bright);object-fit:cover;padding:3px}
.top-names{}
.top-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;font-size:19px;font-weight:700;color:var(--gold);letter-spacing:.05em}
.top-sub{font-size:11px;color:var(--text-muted);letter-spacing:.04em;margin-top:1px}
.btn-new{
  margin-left:auto;padding:8px 16px;
  background:rgba(201,168,76,.08);border:1px solid var(--border-bright);
  color:var(--gold);border-radius:var(--radius);cursor:pointer;
  font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.08em;
  transition:all .15s;
}
.btn-new:hover{background:rgba(201,168,76,.18)}

/* CONTENT */
.content{padding:0 40px 48px}

/* ═══ FORMULÁRIO ════════════════════════════════════ */
.form-wrap{max-width:680px;margin:0 auto}

.briefing-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:32px;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.briefing-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}

.briefing-label{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;font-size:11px;font-weight:600;
  color:var(--gold-dim);letter-spacing:.04em;text-transform:uppercase;
  display:block;text-align:center;margin-bottom:16px;
}

.briefing-textarea{
  width:100%;min-height:180px;
  padding:18px 20px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  outline:none;transition:border .15s;resize:vertical;
  line-height:1.65;text-align:center;
}
.briefing-textarea:focus{border-color:var(--border-bright)}
.briefing-textarea::placeholder{color:var(--text-muted);text-align:center}

.divider{
  display:flex;align-items:center;gap:12px;margin:20px 0;
}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:10px;color:var(--text-muted);font-family:'DM Sans',sans-serif;letter-spacing:.1em}

.ritmo-wrap{
  display:flex;gap:12px;align-items:center;
}
.ritmo-label{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;font-size:10px;font-weight:600;
  color:var(--gold-dim);letter-spacing:.04em;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;
}
.ritmo-input{
  flex:1;padding:11px 16px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  outline:none;transition:border .15s;
}
.ritmo-input:focus{border-color:var(--border-bright)}
.ritmo-input::placeholder{color:var(--text-muted)}

/* BOTÃO GERAR */
.btn-generate{
  width:100%;margin-top:20px;padding:17px;
  background:linear-gradient(135deg,#C9A84C 0%,#E2BA5F 50%,#C9A84C 100%);
  background-size:200% 100%;border:none;border-radius:var(--radius-lg);
  color:#0A0A0B;cursor:pointer;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.04em;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 20px rgba(201,168,76,.25);
}
.btn-generate:hover{background-position:100% 0;transform:translateY(-2px);box-shadow:0 6px 28px rgba(201,168,76,.35)}
.btn-generate:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.spinner{width:16px;height:16px;border:2px solid rgba(10,10,11,.3);border-top-color:#0A0A0B;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ RESULTADO ════════════════════════════════════ */
.result-wrap{max-width:680px;margin:0 auto;display:none;animation:fadeUp .4s ease}
.result-wrap.show{display:block}

.result-header{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:22px 28px;
  margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
}
.result-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.result-nome{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;font-size:18px;font-weight:700;color:var(--gold)}
.result-tag{
  font-size:10px;padding:4px 12px;border-radius:20px;
  background:rgba(201,168,76,.1);color:var(--gold-dim);
  border:1px solid rgba(201,168,76,.2);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;letter-spacing:.06em;
}

.blocks{display:flex;flex-direction:column;gap:10px}
.block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.block-head{
  padding:9px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(201,168,76,.03);
}
.block-num{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:var(--gold-dim);letter-spacing:.04em}
.btn-copy{
  padding:4px 12px;background:var(--bg4);border:1px solid var(--border);
  color:var(--text-dim);border-radius:6px;cursor:pointer;
  font-size:11px;transition:all .15s;
}
.btn-copy:hover{border-color:var(--gold-dim);color:var(--gold)}
.btn-copy.ok{border-color:var(--green);color:var(--green)}
.block-body{padding:16px;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-word}

.result-btns{
  display:flex;gap:10px;margin-top:14px;
  padding-top:14px;border-top:1px solid var(--border);
}
.btn-sec{
  flex:1;padding:11px;border-radius:var(--radius);font-size:11px;
  font-weight:600;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;letter-spacing:.06em;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-salvar{background:rgba(201,168,76,.1);border:1px solid var(--border-bright);color:var(--gold)}
.btn-salvar:hover{background:rgba(201,168,76,.18)}
.btn-regen{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim)}
.btn-regen:hover{border-color:var(--gold-dim);color:var(--gold)}

/* ═══ DETAIL VIEW ══════════════════════════════════ */
.detail{display:none;max-width:680px;margin:0 auto}
.detail.show{display:block;animation:fadeUp .3s ease}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* MOBILE */
@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border)}
  .hist-list{max-height:160px}
  .topbar{padding:16px 16px 0}
  .content{padding:0 16px 40px}
  .briefing-card{padding:20px}
  .briefing-textarea{min-height:140px;font-size:14px}
  .ritmo-wrap{flex-direction:column;align-items:stretch}
  .ritmo-label{display:none}
}
</style>
</head>

      <div class="top-names">
        <div class="top-title">LUX MUSIC</div>
        <div class="top-sub">Gerador de Letras para Suno</div>
      </div>
      <button class="btn-new" onclick="novaLetra()">+ Nova Letra</button>
    </div>

    <div class="content">

      <!-- FORM -->
      <div class="form-wrap" id="formWrap">
        <div class="briefing-card">
          <label class="briefing-label">Briefing da Música</label>

          <textarea class="briefing-textarea" id="briefing"
            placeholder="Descreva a música que você quer criar...&#10;&#10;Para quem é? Qual a ocasião? Qual a história?&#10;&#10;Ex: Música de aniversário para João, 35 anos, personal trainer apaixonado por seu trabalho e pela filha Ana. Tom alegre e emocionante."></textarea>

          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">RITMO</div>
            <div class="divider-line"></div>
          </div>

          <div class="ritmo-wrap">
            <span class="ritmo-label">Estilo Musical</span>
            <input class="ritmo-input" type="text" id="ritmo"
                   placeholder="Ex: Sertanejo, Funk, Pagode, Forró, Pop..."/>
          </div>

          <button class="btn-generate" id="btnGerar" onclick="gerar()">
            <span class="spinner" id="spinner"></span>
            ✦ Gerar com Lux Music
          </button>
        </div>
      </div>

      <!-- RESULTADO -->
      <div class="result-wrap" id="resultWrap">
        <div class="result-header">
          <div class="result-nome" id="resultNome">—</div>
          <div class="result-tag" id="resultTag">—</div>
        </div>
        <div class="blocks" id="blocks"></div>
        <div class="result-btns">
          <button class="btn-sec btn-salvar" onclick="salvar()">💾 Salvar no Histórico</button>
          <button class="btn-sec btn-regen"  onclick="regenerar()">↻ Regenerar</button>
        </div>
      </div>

      <!-- DETALHE HISTÓRICO -->
      <div class="detail" id="detail"></div>

    </div>
  </main>
</div>

<script>
const SYS = null; // não usado — processado no Apps Script
let hist    = JSON.parse(localStorage.getItem('luxmusic_hist') || '[]');
let msgs    = [];
let current = null;

renderHist();

// ═══ GERAR ══════════════════════════════════════════
async function gerar() {
  const briefing = document.getElementById('briefing').value.trim();
  const ritmo    = document.getElementById('ritmo').value.trim();
  if (!briefing) { alert('Por favor, descreva a música no campo de briefing.'); return; }
  if (!ritmo)    { alert('Por favor, informe o ritmo ou estilo musical.'); return; }

  const prompt = briefing + '\n\nRitmo/Estilo: ' + ritmo;

  setLoad(true);
  document.getElementById('resultWrap').classList.remove('show');
  document.getElementById('detail').classList.remove('show');
  msgs = [{ role: 'user', content: prompt }];

  const resp = await api(briefing, ritmo);
  if (!resp) { setLoad(false); return; }

  const data = parse(resp);
  if (data) {
    current = data;
    current._briefing = briefing;
    current._ritmo    = ritmo;
    mostrar(data);
  } else {
    alert('Não foi possível gerar a letra. Tente novamente.');
  }
  setLoad(false);
}

// ═══ REGENERAR ══════════════════════════════════════
async function regenerar() {
  if (!current || !current._briefing) return;
  setLoad(true);
  document.getElementById('resultWrap').classList.remove('show');
  const briefingAlt = current._briefing + '\n\nIMPORTANTE: Gere uma versão DIFERENTE e alternativa, com outras palavras, rimas e estrutura poética. Mantenha o mesmo tema.';
  const resp = await api(briefingAlt, current._ritmo || '');
  if (resp) { const d = parse(resp); if (d) { d._briefing = current._briefing; d._ritmo = current._ritmo; current = d; mostrar(d); } }
  setLoad(false);
}

// ═══ API CLAUDE ══════════════════════════════════════
const APPS_SCRIPT_URL_MUSIC = 'https://script.google.com/macros/s/AKfycbwSeuNpNNq4fiuFMJN4Y8GMrbdHa0OrArUG8bKZDpXMIByOPscIxC8G9P73s4p3XPIwAQ/exec';

async function api(briefing, ritmo) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', APPS_SCRIPT_URL_MUSIC, true);
    xhr.setRequestHeader('Content-Type', 'text/plain;charset=UTF-8');
    xhr.withCredentials = false;
    xhr.onload = function() {
      try {
        const data = JSON.parse(xhr.responseText);
        if (data.ok && data.result) {
          resolve(JSON.stringify(data.result));
        } else {
          alert('Erro: ' + (data.error || 'Resposta inválida'));
          resolve(null);
        }
      } catch(e) {
        alert('Erro ao processar resposta: ' + xhr.responseText.substring(0, 100));
        resolve(null);
      }
    };
    xhr.onerror = function() {
      alert('Erro de rede ao conectar com o servidor.');
      resolve(null);
    };
    xhr.send(JSON.stringify({
      action:   'generateLyrics',
      briefing: briefing,
      ritmo:    ritmo
    }));
  });
}

// ═══ PARSE ══════════════════════════════════════════
function parse(texto) {
  try {
    const clean = texto.replace(/```json|```/g, '').trim();
    const m = clean.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
  } catch(e) {}
  return null;
}

// ═══ MOSTRAR RESULTADO ══════════════════════════════
function mostrar(data) {
  document.getElementById('resultNome').textContent = data.musica_nome || 'Sem título';
  document.getElementById('resultTag').textContent  = genero(data.style_prompt);

  const blocks = document.getElementById('blocks');
  blocks.innerHTML = '';

  const lista = [
    ['1️⃣ Letra (Lyrics)',                    data.lyrics],
    ['2️⃣ Prompt de Estilo (Style Prompt)',    data.style_prompt],
    ['3️⃣ Nível de Estranheza (Weirdness)',    String(data.weirdness)],
    ['4️⃣ Influência de Estilo',               String(data.style_influence)],
  ];
  if (data.persona) lista.push(['5️⃣ Persona', data.persona]);

  lista.forEach(([titulo, conteudo]) => {
    const el = document.createElement('div');
    el.className = 'block';
    el.innerHTML =
      '<div class="block-head">'
      + '<span class="block-num">' + titulo + '</span>'
      + '<button class="btn-copy" onclick="copiar(this,' + JSON.stringify(conteudo) + ')">Copiar</button>'
      + '</div>'
      + '<div class="block-body">' + esc(conteudo) + '</div>';
    blocks.appendChild(el);
  });

  document.getElementById('resultWrap').classList.add('show');
  document.getElementById('resultWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ═══ COPIAR ══════════════════════════════════════════
function copiar(btn, texto) {
  navigator.clipboard.writeText(texto).then(() => {
    btn.textContent = '✓ Copiado!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('ok'); }, 2000);
  });
}

// ═══ SALVAR ══════════════════════════════════════════
function salvar() {
  if (!current) return;
  const item = {
    id:    Date.now(),
    ts:    Date.now(),
    nome:  current.musica_nome || 'Sem título',
    genre: genero(current.style_prompt),
    data:  current
  };
  hist.unshift(item);
  localStorage.setItem('luxmusic_hist', JSON.stringify(hist));
  renderHist();
  alert('✓ Salvo no histórico!');
}

// ═══ HISTÓRICO ══════════════════════════════════════
function renderHist(filtro) {
  const list  = document.getElementById('histList');
  const empty = document.getElementById('histEmpty');
  const items = filtro
    ? hist.filter(h => h.nome.toLowerCase().includes(filtro.toLowerCase()) || h.genre.toLowerCase().includes(filtro.toLowerCase()))
    : hist;

  list.querySelectorAll('.hist-item').forEach(el => el.remove());
  empty.style.display = items.length ? 'none' : 'block';

  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'hist-item';
    el.dataset.id = item.id;
    const dt = new Date(item.ts).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' });
    el.innerHTML =
      '<div class="hi-name">' + esc(item.nome) + '</div>'
      + '<div class="hi-meta"><span class="hi-tag">' + esc(item.genre) + '</span><span>' + dt + '</span></div>';
    el.onclick = () => abrirDetalhe(item);
    list.appendChild(el);
  });
}

function filtrar(v) { renderHist(v); }

function abrirDetalhe(item) {
  document.getElementById('formWrap').style.display   = 'none';
  document.getElementById('resultWrap').classList.remove('show');
  document.querySelectorAll('.hist-item').forEach(i => i.classList.toggle('active', i.dataset.id == item.id));

  const detail = document.getElementById('detail');
  detail.classList.add('show');

  const dt = new Date(item.ts).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

  const lista = [
    ['1️⃣ Letra (Lyrics)',                    item.data.lyrics],
    ['2️⃣ Prompt de Estilo (Style Prompt)',    item.data.style_prompt],
    ['3️⃣ Nível de Estranheza (Weirdness)',    String(item.data.weirdness)],
    ['4️⃣ Influência de Estilo',               String(item.data.style_influence)],
  ];
  if (item.data.persona) lista.push(['5️⃣ Persona', item.data.persona]);

  detail.innerHTML =
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px">'
    + '<div><div style="font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',Roboto,Arial,sans-serif;font-size:17px;font-weight:700;color:var(--gold)">' + esc(item.nome) + '</div>'
    + '<div style="font-size:11px;color:var(--text-muted);margin-top:3px">' + dt + ' · ' + esc(item.genre) + '</div></div>'
    + '<button class="btn-new" onclick="novaLetra()">+ Nova Letra</button></div>'
    + '<div class="blocks">'
    + lista.map(([t, c]) =>
        '<div class="block"><div class="block-head">'
        + '<span class="block-num">' + t + '</span>'
        + '<button class="btn-copy" onclick="copiar(this,' + JSON.stringify(c) + ')">Copiar</button>'
        + '</div><div class="block-body">' + esc(c) + '</div></div>'
      ).join('')
    + '</div>'
    + '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">'
    + '<button class="btn-sec btn-regen" onclick="excluir(' + item.id + ')" style="color:var(--red);border-color:rgba(232,122,122,.3);width:auto;padding:8px 14px">🗑 Excluir</button>'
    + '</div>';
}

function excluir(id) {
  if (!confirm('Excluir esta criação?')) return;
  hist = hist.filter(h => h.id !== id);
  localStorage.setItem('luxmusic_hist', JSON.stringify(hist));
  renderHist();
  novaLetra();
}

function novaLetra() {
  document.getElementById('formWrap').style.display = 'block';
  document.getElementById('resultWrap').classList.remove('show');
  document.getElementById('detail').classList.remove('show');
  document.querySelectorAll('.hist-item').forEach(i => i.classList.remove('active'));
  document.getElementById('briefing').value = '';
  document.getElementById('ritmo').value    = '';
  msgs    = [];
  current = null;
}

// ═══ UTILS ══════════════════════════════════════════
function setLoad(on) {
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btnGerar').disabled = on;
}
function genero(s) { return s ? s.split(',')[0].trim().substring(0, 28) : '—'; }
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
