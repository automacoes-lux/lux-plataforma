<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lux — Vídeos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/theme.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
.wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:20px;padding:40px;text-align:center;
}
.icon{font-size:64px;opacity:.4}
h3{font-family:'Cinzel',serif;font-size:22px;color:var(--text-dim);letter-spacing:.1em}
p{font-size:14px;color:var(--text-muted);max-width:380px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🎬</div>
  <h3>EM DESENVOLVIMENTO</h3>
  <p>O gerador de vídeos da plataforma Lux estará disponível em breve. Volte em alguns dias.</p>
</div>
</body>
</html>
