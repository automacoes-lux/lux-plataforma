<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lux Music — Gerador de Letras</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="../css/theme.css"/>

<script type="module" src="../js/auth-iframe.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;font-size:15px;line-height:1.6;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%,rgba(201,168,76,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 110%,rgba(201,168,76,0.04) 0%,transparent 60%);
}
.container{max-width:780px;margin:0 auto;padding:2rem 1.2rem 4rem}

.page-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:1.5rem;padding-bottom:1rem;
  border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;
}
.page-header h1{
  font-family:'Cinzel',serif;color:var(--gold);
  font-size:18px;letter-spacing:.12em;font-weight:600;
}
.page-header .atendente-label{font-size:12px;color:var(--text-dim)}
.page-header .atendente-label strong{color:var(--gold-dim);font-weight:500}

.tabs{
  display:flex;gap:6px;border-bottom:1px solid var(--border);
  margin-bottom:1.8rem;flex-wrap:nowrap;
}
.tab-btn{
  background:none;border:none;color:var(--text-dim);
  padding:12px 14px;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:500;letter-spacing:.04em;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;text-transform:uppercase;
  flex:1;white-space:nowrap;text-align:center;
}
@media(max-width:520px){
  .tabs{gap:2px}
  .tab-btn{padding:11px 6px;font-size:12px;letter-spacing:.02em}
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.form-grid{display:grid;gap:1.2rem}

.field label{
  display:block;font-size:11px;font-weight:600;letter-spacing:.1em;
  color:var(--gold-dim);margin-bottom:6px;text-transform:uppercase;
}
.field input,.field textarea,.field select{
  width:100%;background:#0E0E0E;border:1px solid var(--border);
  color:var(--text);padding:11px 13px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:14px;
  transition:border-color .15s;
}
.field input:focus,.field textarea:focus,.field select:focus{
  outline:none;border-color:var(--gold-dim);
}
.field textarea{min-height:250px;resize:vertical;line-height:1.5}
.field .hint{
  display:block;font-size:11px;color:var(--text-dim);margin-top:5px;line-height:1.5;
}
.field .hint strong{color:var(--gold-dim)}

.image-upload{
  border:2px dashed var(--border);border-radius:10px;
  padding:1.5rem;text-align:center;cursor:pointer;
  transition:all .15s;background:rgba(255,255,255,.02);
}
.image-upload:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.04)}
.image-upload input{display:none}
.image-upload-text{font-size:13px;color:var(--text-dim)}
.image-upload-text strong{color:var(--gold-dim)}
.image-preview{margin-top:12px;display:none;position:relative}
.image-preview img{
  max-width:100%;max-height:200px;border-radius:8px;
  border:1px solid var(--border);
}
.image-preview .remove-img{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.7);border:1px solid var(--border);
  color:#fff;width:28px;height:28px;border-radius:50%;
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
}
.image-preview.has-img{display:block}

.btn-primary{
  width:100%;padding:14px 24px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-bright) 100%);
  border:none;border-radius:10px;
  color:#1A1A1A;font-family:'Cinzel',serif;
  font-size:15px;font-weight:600;letter-spacing:.15em;
  cursor:pointer;text-transform:uppercase;
  transition:transform .1s,box-shadow .15s;
}
.btn-primary:hover:not(:disabled){
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(201,168,76,.25);
}
.btn-primary:disabled{opacity:.5;cursor:wait}

.btn-secondary{
  display:inline-block;padding:12px 18px;
  background:transparent;border:1px solid var(--border-bright);
  color:var(--gold);border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.08em;
  transition:all .15s;text-decoration:none;text-transform:uppercase;
  text-align:center;white-space:nowrap;
}
.btn-secondary:hover{background:rgba(201,168,76,.08)}

.status-box{
  margin-top:1.2rem;padding:14px 16px;border-radius:8px;
  border:1px solid var(--border);background:rgba(255,255,255,.02);
  font-size:13px;color:var(--text-dim);display:none;
}
.status-box.show{display:block}
.status-box.error{
  border-color:rgba(220,80,80,.4);background:rgba(220,80,80,.06);color:#E89090;
}
.status-box.loading::before{
  content:'';display:inline-block;width:14px;height:14px;
  border:2px solid var(--gold-dim);border-top-color:transparent;
  border-radius:50%;animation:spin 1s linear infinite;
  vertical-align:middle;margin-right:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.lyrics-header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.lyrics-header h2{font-family:'Cinzel',serif;color:var(--gold);font-size:19px;letter-spacing:.06em;margin-bottom:8px}
.lyrics-header .meta{font-size:15px;color:var(--text-dim)}
.lyrics-header .meta span{color:var(--gold-dim)}

.lyrics-section{
  margin-bottom:1.4rem;padding:14px 16px;
  background:rgba(255,255,255,.02);border-radius:10px;
  border:1px solid var(--border);position:relative;
}
.lyrics-section.regenerating{border-color:var(--gold-dim);background:rgba(201,168,76,.04)}
.lyrics-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lyrics-section-tag{font-family:'Cinzel',serif;color:var(--gold);font-size:13px;font-weight:600;letter-spacing:.1em}
.btn-regen{
  background:transparent;border:1px solid var(--border-bright);
  color:var(--gold);border-radius:6px;
  padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.04em;
  transition:all .15s;display:flex;align-items:center;gap:5px;
}
.btn-regen:hover:not(:disabled){background:rgba(201,168,76,.1)}
.btn-regen:disabled{opacity:.5;cursor:wait}
.btn-regen .spin-icon{display:inline-block;animation:spin 1s linear infinite}
.lyrics-section-content{
  white-space:pre-wrap;font-family:'DM Sans',sans-serif;
  font-size:14px;line-height:1.7;color:var(--text);
}

.style-box{
  margin-top:1.5rem;padding:14px 16px;
  background:rgba(201,168,76,.04);border:1px solid var(--border);border-radius:8px;
}
.style-box-label{
  font-size:12px;color:var(--gold-dim);letter-spacing:.1em;
  font-weight:600;text-transform:uppercase;margin-bottom:6px;
}
.style-box-content{font-size:16px;color:var(--text);line-height:1.6}
.style-box-meta{
  margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
  font-size:15px;color:var(--text-dim);display:flex;gap:18px;flex-wrap:wrap;
}
.style-box-meta strong{color:var(--gold-dim);font-weight:500}
.style-box-meta .num-white{color:#FFFFFF;font-weight:600}

.lyrics-actions{margin-top:1.5rem;display:flex;flex-direction:column;gap:1.5rem}
.lyrics-actions .copy-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* mobile: mantém 2 colunas pra economizar espaço */

.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:#121212;border:1px solid var(--gold-dim);
  color:var(--gold);padding:12px 22px;border-radius:8px;
  font-size:13px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.4);
  opacity:0;transition:opacity .25s;pointer-events:none;
}
.toast.show{opacity:1}
.toast.error{border-color:#C25050;color:#E89090}

.history-empty{text-align:center;padding:3rem 1rem;color:var(--text-dim);font-size:14px}
.history-item{
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;margin-bottom:10px;
  cursor:pointer;transition:all .15s;
}
.history-item:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.04)}
.history-item-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;flex-wrap:wrap;gap:6px;
}
.history-item-title{font-family:'Cinzel',serif;color:var(--gold);font-size:14px;font-weight:600;letter-spacing:.04em}
.history-item-date{font-size:11px;color:var(--text-dim)}
.history-item-meta{font-size:12px;color:var(--text-dim);line-height:1.5}
.history-item-meta strong{color:var(--gold-dim)}
.history-item-badge{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:30px;
  background:rgba(201,168,76,.1);color:var(--gold-dim);
  border:.5px solid var(--border-bright);letter-spacing:.06em;
}
.history-item-badge.cost{
  background:rgba(127,184,122,.12);color:#7FB87A;
  border-color:rgba(127,184,122,.3);font-weight:600;
}
.history-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.history-cost{font-size:11px;color:var(--text-dim);font-weight:500}

/* ── Caixa única com a letra completa ── */
.lyrics-full{
  margin-bottom:1.2rem;padding:18px 18px;
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:10px;white-space:pre-wrap;
  font-family:'DM Sans',sans-serif;font-size:18px;
  line-height:1.75;color:var(--text);
}
.lyrics-full.regenerating{border-color:var(--gold-dim);background:rgba(201,168,76,.04);opacity:.7}

/* ── Modificar letra por bloco ── */
.modify-box{margin-bottom:1.5rem}
.modify-hint{font-size:12px;color:var(--text-dim);margin-bottom:10px}
.block-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.block-btn{
  background:transparent;border:1px solid var(--border-bright);
  color:var(--gold);border-radius:8px;padding:10px 6px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.03em;
  transition:all .15s;text-transform:uppercase;
}
.block-btn:hover:not(:disabled){background:rgba(201,168,76,.1)}
.block-btn:disabled{opacity:.4;cursor:wait}
.block-btn.busy{opacity:.6;cursor:wait}
@media(max-width:520px){.block-btn{font-size:12px;padding:10px 4px;letter-spacing:0}}

/* ── Advanced Mode (instrumentos Suno) ── */
.advanced{
  margin-top:1.5rem;border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
}
.advanced-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;cursor:pointer;background:rgba(255,255,255,.02);
  user-select:none;transition:background .15s;
}
.advanced-head:hover{background:rgba(201,168,76,.04)}
.advanced-head .adv-title{
  font-size:13px;font-weight:600;letter-spacing:.1em;
  color:var(--gold-dim);text-transform:uppercase;
}
.advanced-head .adv-arrow{color:var(--gold-dim);transition:transform .2s;font-size:16px}
.advanced.open .adv-arrow{transform:rotate(180deg)}
.advanced-body{display:none;padding:16px;border-top:1px solid var(--border)}
.advanced.open .advanced-body{display:block;animation:fadeIn .25s}
.adv-desc{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:14px}
.adv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
@media(max-width:520px){.adv-grid{grid-template-columns:1fr}}
.adv-field label{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;flex-wrap:wrap;
  font-size:13px;font-weight:600;letter-spacing:.08em;
  color:var(--gold-dim);margin-bottom:5px;text-transform:uppercase;
}
.adv-repeat{
  background:transparent;border:1px solid var(--border-bright);
  color:var(--gold);border-radius:6px;padding:3px 8px;
  font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.02em;
  font-family:'DM Sans',sans-serif;text-transform:none;transition:all .15s;
  white-space:nowrap;
}
.adv-repeat:hover{background:rgba(201,168,76,.1)}
.adv-field input{
  width:100%;background:#0E0E0E;border:1px solid var(--border);
  color:var(--text);padding:10px 12px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:13px;
  transition:border-color .15s;
}
.adv-field input:focus{outline:none;border-color:var(--gold-dim)}
.adv-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.adv-actions{grid-template-columns:1fr}}
@media(max-width:520px){
  .btn-secondary{font-size:11px;padding:11px 8px;letter-spacing:.03em}
  .lyrics-actions .copy-row{gap:8px}
}
.adv-btn{
  padding:12px 16px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.05em;
  text-transform:uppercase;transition:all .15s;border:1px solid var(--border-bright);
}
.adv-btn.primary{
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-bright) 100%);
  color:#1A1A1A;border:none;
}
.adv-btn.primary:hover:not(:disabled){box-shadow:0 4px 14px rgba(201,168,76,.25)}
.adv-btn.ghost{background:transparent;color:var(--gold)}
.adv-btn.ghost:hover:not(:disabled){background:rgba(201,168,76,.08)}
.adv-btn:disabled{opacity:.5;cursor:wait}
</style>
</head>
<body>

<div class="container">

  <div class="tabs">
    <button class="tab-btn active" data-tab="new">✦ Novo Pedido</button>
    <button class="tab-btn" data-tab="lyrics" id="tab-lyrics-btn" style="display:none">🎵 Letra Gerada</button>
    <button class="tab-btn" data-tab="history">📜 Histórico</button>
  </div>

  <div id="tab-new" class="tab-content active">
    <div class="form-grid">

      <div class="field">
        <label>Briefing</label>
        <textarea id="briefing" placeholder="Conte sobre o cliente, produto/serviço, tom desejado, mensagem-chave, endereço, telefone, diferenciais..."></textarea>
        <span class="hint">💡 <strong>Dica:</strong> endereços, telefones e locais entram automaticamente no Spoken Word do final da música.</span>
      </div>

      <div class="field">
        <label>📎 Imagem de Referência (opcional)</label>
        <label class="image-upload" id="imageUploadLabel">
          <input type="file" id="imageInput" accept="image/*"/>
          <div class="image-upload-text">
            <strong>Clique para enviar</strong> panfleto, cartão ou foto do estabelecimento<br/>
            <small>A IA lê as informações da imagem automaticamente (até 10MB)</small>
          </div>
        </label>
        <div class="image-preview" id="imagePreview">
          <img id="imagePreviewImg" alt=""/>
          <button type="button" class="remove-img" id="removeImg" title="Remover">✕</button>
        </div>
        <span class="hint">Se enviar apenas a imagem (sem briefing), a IA vai extrair as informações automaticamente.</span>
      </div>

      <div class="field">
        <label>Ritmo / Estilo Musical</label>
        <input type="text" id="ritmo" placeholder="Ex: Forró pé-de-serra, Sertanejo dance, Pagode romântico, Funk consciente..."/>
        <span class="hint">Quanto mais específico, melhor a IA acerta o estilo.</span>
      </div>

      <button class="btn-primary" id="btnGerar">✦ Gerar Letra</button>

      <div class="status-box" id="statusGerar"></div>
    </div>
  </div>

  <div id="tab-lyrics" class="tab-content">
    <div id="lyricsContent"></div>
  </div>

  <div id="tab-history" class="tab-content">
    <div id="historyContent">
      <div class="history-empty">Carregando histórico...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://lux-music.plataformalux.workers.dev';
const FIGURINHAS_URL = 'https://lux-figurinhas.plataformalux.workers.dev';

let currentOrder = null;
let compressedImage = null;
let currentAtendente = '';

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'history') loadHistory();
  });
});

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

async function initAtendente() {
  const label = document.getElementById('atendenteLabel'); // pode não existir mais
  const setLabel = (txt) => { if (label) label.textContent = txt; };
  try {
    let tries = 0;
    while (!window.__luxFetch && tries < 50) {
      await new Promise(r => setTimeout(r, 100));
      tries++;
    }
    if (!window.__luxFetch) {
      setLabel('(recarregue)');
      return;
    }
    const resp = await window.__luxFetch(FIGURINHAS_URL + '/admin/me');
    const data = await resp.json();
    if (data.ok && data.user) {
      currentAtendente = data.user.name || data.user.email || 'Atendente';
      setLabel(currentAtendente);
    } else {
      setLabel('Atendente');
    }
  } catch (e) {
    setLabel('(erro)');
  }
}
initAtendente();

const imageInput   = document.getElementById('imageInput');
const imagePreview = document.getElementById('imagePreview');
const imagePreviewImg = document.getElementById('imagePreviewImg');
const removeImgBtn = document.getElementById('removeImg');

imageInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    showToast('Imagem maior que 10MB. Use uma menor.', true);
    imageInput.value = '';
    return;
  }
  try {
    const { base64, mime, dataUrl } = await compressImage(file);
    compressedImage = { base64, mime };
    imagePreviewImg.src = dataUrl;
    imagePreview.classList.add('has-img');
    showToast('✓ Imagem carregada');
  } catch (err) {
    showToast('Erro ao processar imagem: ' + err.message, true);
    imageInput.value = '';
  }
});

removeImgBtn.addEventListener('click', () => {
  compressedImage = null;
  imageInput.value = '';
  imagePreview.classList.remove('has-img');
});

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        const base64  = dataUrl.split(',')[1];
        resolve({ base64, mime: 'image/jpeg', dataUrl });
      };
      img.onerror = () => reject(new Error('Imagem inválida'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Erro ao ler arquivo'));
    reader.readAsDataURL(file);
  });
}

document.getElementById('btnGerar').addEventListener('click', async () => {
  const briefing = document.getElementById('briefing').value.trim();
  const ritmo    = document.getElementById('ritmo').value.trim();
  const status   = document.getElementById('statusGerar');

  if (!briefing && !compressedImage) {
    showToast('Preencha o briefing ou envie uma imagem.', true);
    return;
  }
  if (!ritmo) { showToast('Preencha o ritmo.', true); return; }

  const btn = document.getElementById('btnGerar');
  btn.disabled = true;
  status.className = 'status-box show loading';
  status.textContent = 'Gerando letra com IA... pode levar até 30 segundos.';

  try {
    const body = { briefing, ritmo };
    if (compressedImage) {
      body.imageBase64 = compressedImage.base64;
      body.imageMime   = compressedImage.mime;
    }

    const resp = await window.__luxFetch(API_URL + '/createOrder', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body)
    });
    const data = await resp.json();

    if (!data.ok) {
      status.className = 'status-box show error';
      status.textContent = '✘ ' + (data.error || 'Erro desconhecido');
      btn.disabled = false;
      return;
    }

    currentOrder = {
      orderId:    data.orderId,
      briefing,
      ritmo,
      clientName: data.result.nome_negocio || '',
      result:     data.result,
      costBRL:    data.costBRL ?? null
    };

    status.className = 'status-box show';
    status.textContent = '✓ Letra gerada com sucesso!';
    btn.disabled = false;

    renderLyrics(currentOrder);
    document.getElementById('tab-lyrics-btn').style.display = '';
    document.querySelector('[data-tab="lyrics"]').click();
  } catch (err) {
    status.className = 'status-box show error';
    status.textContent = '✘ Erro de rede: ' + err.message;
    btn.disabled = false;
  }
});

function renderLyrics(order) {
  const c = document.getElementById('lyricsContent');
  const r = order.result;
  const sections = parseLyrics(r.lyrics);

  // Nome do comércio em destaque (grande). Ritmo na linha de baixo.
  const negocio = order.clientName || r.musica_nome || 'Letra sem título';

  // Letra completa numa caixa só
  const letraCompleta = sections.map(s => `[${s.name}]\n${s.body}`).join('\n\n');

  let html = `
    <div class="lyrics-header">
      <h2>${escapeHtml(negocio)}</h2>
      <div class="meta">Ritmo: <span>${escapeHtml(order.ritmo)}</span></div>
    </div>

    <div class="lyrics-full" id="lyricsFull">${escapeHtml(letraCompleta)}</div>

    <div class="modify-box">
      <div class="modify-hint">Clique no bloco que deseja modificar — só aquela parte muda, o resto da letra é mantido.</div>
      <div class="block-btns">
        <button class="block-btn" data-block="Verse">Verse</button>
        <button class="block-btn" data-block="Chorus">Chorus</button>
        <button class="block-btn" data-block="Bridge">Bridge</button>
        <button class="block-btn" data-block="Outro">Outro</button>
      </div>
    </div>

    <div class="style-box">
      <div class="style-box-label">Estilo / Style Prompt</div>
      <div class="style-box-content">${escapeHtml(r.style_prompt || '')}</div>
      <div class="style-box-meta">
        <span><strong>Weirdness:</strong> <b class="num-white">${r.weirdness ?? '-'}</b></span>
        <span><strong>Style Influence:</strong> <b class="num-white">${r.style_influence ?? '-'}</b></span>
      </div>
    </div>

    <div class="advanced" id="advancedMode">
      <div class="advanced-head" id="advHead">
        <span class="adv-title">⚙ Advanced Mode</span>
        <span class="adv-arrow">▼</span>
      </div>
      <div class="advanced-body">
        <div class="adv-desc">
          Adicione instrumentos a cada bloco. Clique em <strong>repetir</strong> para
          preencher todos os blocos automaticamente com o mesmo instrumento.
        </div>
        <div class="adv-grid">
          <div class="adv-field">
            <label>Verse
              <button type="button" class="adv-repeat" id="btnRepeatVerse" title="Repetir este instrumento em todos os blocos">⟳ repetir instrumento</button>
            </label>
            <input type="text" id="instVerse" placeholder="Ex: guitarra metálica"/>
          </div>
          <div class="adv-field">
            <label>Chorus</label>
            <input type="text" id="instChorus" placeholder="Ex: saxofone"/>
          </div>
          <div class="adv-field">
            <label>Bridge</label>
            <input type="text" id="instBridge" placeholder="Ex: flauta"/>
          </div>
          <div class="adv-field">
            <label>Outro</label>
            <input type="text" id="instOutro" placeholder="Ex: piano suave"/>
          </div>
        </div>
        <div class="adv-actions">
          <button class="adv-btn primary" id="btnApplyInst">Aplicar instrumentos</button>
        </div>
        <div class="status-box" id="advStatus" style="margin-top:14px"></div>
      </div>
    </div>

    <div class="lyrics-actions" style="margin-top:1.5rem">
      <div class="copy-row">
        <button class="btn-secondary" id="btnCopyLyrics">📋 Copiar Letra</button>
        <button class="btn-secondary" id="btnCopyPrompt">🎼 Copiar Prompt</button>
      </div>
      <button class="btn-primary" id="btnNew">+ Novo Pedido</button>
    </div>
  `;

  c.innerHTML = html;

  // Botões de modificar bloco
  c.querySelectorAll('.block-btn').forEach(b => {
    b.addEventListener('click', () => regenerateBlock(b.dataset.block, b));
  });

  // Advanced mode: expandir/recolher
  document.getElementById('advHead').addEventListener('click', () => {
    document.getElementById('advancedMode').classList.toggle('open');
  });
  document.getElementById('btnApplyInst').addEventListener('click', () => applyInstruments(false));
  document.getElementById('btnRepeatVerse').addEventListener('click', () => {
    const v = document.getElementById('instVerse').value.trim();
    if (!v) { showToast('Preencha o campo Verse primeiro.', true); return; }
    document.getElementById('instChorus').value = v;
    document.getElementById('instBridge').value = v;
    document.getElementById('instOutro').value  = v;
    showToast('✓ Instrumento repetido em todos os blocos');
  });

  document.getElementById('btnCopyLyrics').addEventListener('click', copyLyricsOnly);
  document.getElementById('btnCopyPrompt').addEventListener('click', copyPromptOnly);
  document.getElementById('btnNew').addEventListener('click', () => {
    document.querySelector('[data-tab="new"]').click();
    resetForm();
  });
}

// Atualiza a caixa única de letra a partir do currentOrder
function refreshLyricsBox() {
  const sections = parseLyrics(currentOrder.result.lyrics);
  const box = document.getElementById('lyricsFull');
  if (box) box.textContent = sections.map(s => `[${s.name}]\n${s.body}`).join('\n\n');
}

function parseLyrics(text) {
  if (!text) return [];

  // Quebra em blocos a cada linha que começa com [
  const rawParts = text.split(/\n(?=\[)/);
  const blocks = rawParts.map(block => {
    const m = block.match(/^\[([^\]]+)\]\s*\n?([\s\S]*)$/);
    if (!m) return { name: 'Section', body: block.trim() };
    return { name: m[1].trim(), body: m[2].trim() };
  });

  // Funde [Spoken Word ...] dentro do [Outro] que vem antes
  const merged = [];
  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    const nameLower = b.name.toLowerCase();
    const isSpoken = nameLower.startsWith('spoken') || nameLower.includes('locuç');

    if (isSpoken && merged.length > 0 &&
        merged[merged.length - 1].name.toLowerCase() === 'outro') {
      // Funde com o Outro anterior
      const prev = merged[merged.length - 1];
      const spokenContent = `[${b.name}]\n${b.body}`.trim();
      prev.body = prev.body
        ? `${prev.body}\n${spokenContent}`
        : spokenContent;
    } else {
      merged.push(b);
    }
  }
  return merged;
}

// Regenera UM bloco pelo nome (Verse/Chorus/Bridge/Outro).
// Reusa o endpoint /regenerateSection que já existe e funciona.
// Se houver vários blocos com o mesmo nome, regenera o primeiro.
async function regenerateBlock(blockName, btn) {
  if (!currentOrder) return;
  const sections = parseLyrics(currentOrder.result.lyrics);
  const idx = sections.findIndex(s => s.name.toLowerCase() === blockName.toLowerCase());
  if (idx === -1) {
    showToast('Esta letra não tem bloco "' + blockName + '".', true);
    return;
  }

  const allBtns = document.querySelectorAll('.block-btn');
  allBtns.forEach(b => b.disabled = true);
  btn.classList.add('busy');
  const original = btn.textContent;
  btn.textContent = '...';
  const box = document.getElementById('lyricsFull');
  if (box) box.classList.add('regenerating');

  try {
    const resp = await window.__luxFetch(API_URL + '/regenerateSection', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        orderId:     currentOrder.orderId,
        sectionName: sections[idx].name,
        lyrics:      currentOrder.result.lyrics,
        briefing:    currentOrder.briefing
      })
    });
    const data = await resp.json();
    if (!data.ok) {
      showToast('Erro ao modificar: ' + data.error, true);
    } else {
      currentOrder.result.lyrics = data.lyrics;
      refreshLyricsBox();
      showToast('✓ ' + blockName + ' modificado');
    }
  } catch (err) {
    showToast('Erro de rede: ' + err.message, true);
  } finally {
    allBtns.forEach(b => b.disabled = false);
    btn.classList.remove('busy');
    btn.textContent = original;
    if (box) box.classList.remove('regenerating');
  }
}

// Advanced Mode: adiciona instrumentos no padrão Suno em cada bloco.
// Chama o Worker do Lux Music (endpoint /applyInstruments).
async function applyInstruments() {
  if (!currentOrder) return;
  const status = document.getElementById('advStatus');
  const bInst  = document.getElementById('btnApplyInst');

  const instruments = {
    Verse:  document.getElementById('instVerse').value.trim(),
    Chorus: document.getElementById('instChorus').value.trim(),
    Bridge: document.getElementById('instBridge').value.trim(),
    Outro:  document.getElementById('instOutro').value.trim()
  };
  if (!instruments.Verse && !instruments.Chorus && !instruments.Bridge && !instruments.Outro) {
    showToast('Preencha ao menos um instrumento.', true);
    return;
  }

  bInst.disabled = true;
  status.className = 'status-box show loading';
  status.textContent = 'Consultando a IA e aplicando instrumentos no padrão Suno...';

  try {
    const resp = await window.__luxFetch(API_URL + '/applyInstruments', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        orderId:     currentOrder.orderId,
        lyrics:      currentOrder.result.lyrics,
        instruments
      })
    });
    const data = await resp.json();
    if (!data.ok) {
      status.className = 'status-box show error';
      status.textContent = '✘ ' + (data.error || 'Erro ao aplicar instrumentos');
    } else {
      currentOrder.result.lyrics = data.lyrics;
      refreshLyricsBox();
      status.className = 'status-box show';
      status.textContent = '✓ Instrumentos aplicados na letra (padrão Suno).';
      showToast('✓ Instrumentos aplicados');
    }
  } catch (err) {
    status.className = 'status-box show error';
    status.textContent = '✘ Erro de rede: ' + err.message;
  } finally {
    bInst.disabled = false;
  }
}

// Copia só a letra pura
function copyLyricsOnly() {
  if (!currentOrder) return;
  const sections = parseLyrics(currentOrder.result.lyrics);
  const text = sections.map(s => `[${s.name}]\n${s.body}`).join('\n\n');
  navigator.clipboard.writeText(text)
    .then(() => showToast('✓ Letra copiada!'))
    .catch(() => showToast('Erro ao copiar', true));
}

// Copia só o style prompt (sem weirdness/style_influence)
function copyPromptOnly() {
  if (!currentOrder) return;
  const r = currentOrder.result;
  const text = r.style_prompt || '';
  navigator.clipboard.writeText(text)
    .then(() => showToast('✓ Prompt copiado!'))
    .catch(() => showToast('Erro ao copiar', true));
}

function resetForm() {
  document.getElementById('briefing').value = '';
  document.getElementById('ritmo').value = '';
  compressedImage = null;
  imageInput.value = '';
  imagePreview.classList.remove('has-img');
  document.getElementById('statusGerar').className = 'status-box';
  document.getElementById('statusGerar').textContent = '';
}

async function loadHistory() {
  const c = document.getElementById('historyContent');
  c.innerHTML = '<div class="history-empty">Carregando...</div>';
  try {
    const resp = await window.__luxFetch(API_URL + '/listOrders?limit=30');
    const data = await resp.json();
    if (!data.ok) {
      c.innerHTML = '<div class="history-empty">Erro: ' + escapeHtml(data.error || '') + '</div>';
      return;
    }
    if (!data.orders || !data.orders.length) {
      c.innerHTML = '<div class="history-empty">Nenhum pedido ainda. Gere sua primeira letra!</div>';
      return;
    }
    let html = '';
    data.orders.forEach(o => {
      const custoTxt = (o.costBRL != null)
        ? `<div class="history-cost">R$ ${Number(o.costBRL).toFixed(2).replace('.', ',')}</div>`
        : '';
      html += `
        <div class="history-item" data-order-id="${escapeHtml(o.orderId)}">
          <div class="history-item-top">
            <span class="history-item-title">${escapeHtml(o.clientName || o.musicaNome || '(sem nome)')}</span>
            <div class="history-right">
              <span class="history-item-date">${escapeHtml(o.createdAt || '')}</span>
              ${custoTxt}
            </div>
          </div>
          <div class="history-item-meta">
            ${escapeHtml(o.ritmo || '-')}
            ${o.hasImage ? ' <span class="history-item-badge">📎 c/ imagem</span>' : ''}
            ${o.regenerations ? ' <span class="history-item-badge">↻ ' + o.regenerations + 'x</span>' : ''}
          </div>
        </div>
      `;
    });
    c.innerHTML = html;
    c.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => openHistoryOrder(el.dataset.orderId));
    });
  } catch (err) {
    c.innerHTML = '<div class="history-empty">Erro de rede: ' + escapeHtml(err.message) + '</div>';
  }
}

async function openHistoryOrder(orderId) {
  try {
    const resp = await window.__luxFetch(API_URL + '/getOrder?orderId=' + encodeURIComponent(orderId));
    const data = await resp.json();
    if (!data.ok) { showToast('Erro: ' + data.error, true); return; }
    const o = data.order;
    currentOrder = {
      orderId:    o.orderId,
      briefing:   o.briefing,
      ritmo:      o.ritmo,
      clientName: o.clientName,
      result:     o.result,
      costBRL:    o.costBRL ?? null
    };
    renderLyrics(currentOrder);
    document.getElementById('tab-lyrics-btn').style.display = '';
    document.querySelector('[data-tab="lyrics"]').click();
  } catch (err) {
    showToast('Erro: ' + err.message, true);
  }
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
