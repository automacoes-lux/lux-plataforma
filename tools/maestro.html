<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lux Music — Gerador de Letras</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="../css/theme.css"/>

<script type="module" src="../js/auth-iframe.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;font-size:15px;line-height:1.6;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%,rgba(201,168,76,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 110%,rgba(201,168,76,0.04) 0%,transparent 60%);
}
.container{max-width:780px;margin:0 auto;padding:2rem 1.2rem 4rem}

.page-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:1.5rem;padding-bottom:1rem;
  border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;
}
.page-header h1{
  font-family:'Cinzel',serif;color:var(--gold);
  font-size:18px;letter-spacing:.12em;font-weight:600;
}
.page-header .atendente-label{font-size:12px;color:var(--text-dim)}
.page-header .atendente-label strong{color:var(--gold-dim);font-weight:500}

.tabs{
  display:flex;gap:6px;border-bottom:1px solid var(--border);
  margin-bottom:1.8rem;flex-wrap:nowrap;
}
.tab-btn{
  background:none;border:none;color:var(--text-dim);
  padding:12px 14px;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:500;letter-spacing:.04em;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;text-transform:uppercase;
  flex:1;white-space:nowrap;text-align:center;
}
@media(max-width:520px){
  .tabs{gap:2px}
  .tab-btn{padding:11px 6px;font-size:12px;letter-spacing:.02em}
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.form-grid{display:grid;gap:1.2rem}

.field label{
  display:block;font-size:14px;font-weight:600;letter-spacing:.1em;
  color:var(--gold-dim);margin-bottom:6px;text-transform:uppercase;
}
.field input,.field textarea,.field select{
  width:100%;background:#0E0E0E;border:1px solid var(--border);
  color:var(--text);padding:11px 13px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:14px;
  transition:border-color .15s;
}
.field input:focus,.field textarea:focus,.field select:focus{
  outline:none;border-color:var(--gold-dim);
}
.field textarea{min-height:250px;resize:vertical;line-height:1.5}
.field .hint{
  display:block;font-size:11px;color:var(--text-dim);margin-top:5px;line-height:1.5;
}
.field .hint strong{color:var(--gold-dim)}

/* ── Botão Lixeira pra limpar textarea ─────────────── */
.textarea-wrap{position:relative}
.btn-clear-text{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  color:var(--text-dim);border-radius:6px;
  padding:5px 8px;font-size:14px;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .15s;line-height:1;z-index:2;
  display:none;
}
.btn-clear-text:hover{background:rgba(220,80,80,.18);color:#E89090;border-color:#E89090}
.btn-clear-text.visible{display:inline-block}

.image-upload{
  border:2px dashed var(--border);border-radius:10px;
  padding:1.5rem;text-align:center;cursor:pointer;
  transition:all .15s;background:rgba(255,255,255,.02);
}
.image-upload:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.04)}
.image-upload input{display:none}
.image-upload-text{font-size:13px;color:var(--text-dim)}
.image-upload-text strong{color:var(--gold-dim)}
.image-preview{margin-top:12px;display:none;position:relative}
.image-preview img{
  max-width:100%;max-height:200px;border-radius:8px;
  border:1px solid var(--border);
}
.image-preview .remove-img{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.7);border:1px solid var(--border);
  color:#fff;width:28px;height:28px;border-radius:50%;
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
}
.image-preview.has-img{display:block}

/* ── Ritmos Favoritos ─────────────────────────────────── */
.ritmo-wrapper{position:relative}
.ritmo-input-row{display:flex;gap:6px;align-items:stretch}
.ritmo-input-row input{flex:1}
.ritmo-btn{
  background:transparent;border:1px solid var(--border-bright);
  color:var(--gold);border-radius:8px;
  padding:0 12px;font-size:16px;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .15s;white-space:nowrap;display:flex;align-items:center;
}
.ritmo-btn:hover:not(:disabled){background:rgba(201,168,76,.1)}
.ritmo-btn:disabled{opacity:.4;cursor:wait}
.ritmo-btn.saved{color:#FFD700;border-color:#FFD700}
.ritmo-btn-arrow{font-size:22px;line-height:1;padding:0 14px}
.fav-dropdown{
  position:absolute;top:calc(100% + 4px);right:0;left:0;
  background:#161616;border:1px solid var(--gold-dim);
  border-radius:8px;padding:6px;z-index:50;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  max-height:240px;overflow-y:auto;display:none;
}
.fav-dropdown.show{display:block}
.fav-empty{color:var(--text-dim);font-size:12px;padding:10px;text-align:center}
.fav-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;border-radius:6px;cursor:pointer;
  font-size:13px;color:var(--text);transition:background .12s;gap:6px;
}
.fav-item:hover{background:rgba(201,168,76,.08)}
.fav-item-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-item-remove{
  background:transparent;border:none;color:var(--text-dim);
  cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;
  transition:all .12s;
}
.fav-item-remove:hover{background:rgba(220,80,80,.15);color:#E89090}

.btn-primary{
  width:100%;padding:14px 24px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-bright) 100%);
  border:none;border-radius:10px;
  color:#1A1A1A;font-family:'Cinzel',serif;
  font-size:15px;font-weight:600;letter-spacing:.15em;
  cursor:pointer;text-transform:uppercase;
  transition:transform .1s,box-shadow .15s;
}
.btn-primary:hover:not(:disabled){
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(201,168,76,.25);
}
.btn-primary:disabled{opacity:.5;cursor:wait}

.btn-secondary{
  display:inline-block;padding:12px 18px;
  background:transparent;border:1px solid var(--border-bright);
  color:var(--gold);border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.08em;
  transition:all .15s;text-decoration:none;text-transform:uppercase;
  text-align:center;white-space:nowrap;
}
.btn-secondary:hover{background:rgba(201,168,76,.08)}

/* ── Gravador de áudio (Instruções) ───────────────── */
.instr-label-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:6px;flex-wrap:wrap;gap:8px;
}
.instr-label-row label{margin-bottom:0}
.mic-btn{
  background:rgba(201,168,76,.12);border:1px solid var(--gold-dim);
  color:var(--gold);border-radius:8px;
  padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .15s;display:inline-flex;align-items:center;gap:6px;
}
.mic-btn:hover:not(:disabled){background:rgba(201,168,76,.22)}
.mic-btn:disabled{opacity:.5;cursor:not-allowed}
.mic-icon{font-size:14px}

.mic-state{
  background:#1a1a1a;border:1px solid #DC5050;
  border-radius:8px;padding:10px 12px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.mic-pulse{
  width:10px;height:10px;background:#DC5050;border-radius:50%;
  animation:micPulse 1s ease-in-out infinite;
}
@keyframes micPulse{
  0%,100%{opacity:.4;transform:scale(.9)}
  50%{opacity:1;transform:scale(1.1)}
}
.mic-time{
  color:#E89090;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;
  flex:1;
}
.mic-stop{
  background:#DC5050;border:none;color:white;
  padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;
}
.mic-stop:hover{background:#C04040}
.mic-cancel{
  background:transparent;border:1px solid var(--border-bright);
  color:var(--text-dim);padding:6px 12px;border-radius:6px;
  font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;
}
.mic-status{font-size:12px;color:var(--text-dim);margin-bottom:8px;min-height:0}
.mic-status.transcribing{color:var(--gold);min-height:18px}
.mic-status.success{color:#8FD68F;min-height:18px}
.mic-status.error{color:#E89090;min-height:18px}

.status-box{
  margin-top:1.2rem;padding:14px 16px;border-radius:8px;
  border:1px solid var(--border);background:rgba(255,255,255,.02);
  font-size:13px;color:var(--text-dim);display:none;
}
.status-box.show{display:block}
.status-box.error{
  border-color:rgba(220,80,80,.4);background:rgba(220,80,80,.06);color:#E89090;
}
.status-box.loading::before{
  content:'';display:inline-block;width:14px;height:14px;
  border:2px solid var(--gold-dim);border-top-color:transparent;
  border-radius:50%;animation:spin 1s linear infinite;
  vertical-align:middle;margin-right:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.lyrics-header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.lyrics-header h2{font-family:'Cinzel',serif;color:var(--gold);font-size:19px;letter-spacing:.06em;margin-bottom:8px}
.lyrics-header .meta{font-size:15px;color:var(--text-dim)}
.lyrics-header .meta span{color:var(--gold-dim)}

.lyrics-section{
  margin-bottom:1.4rem;padding:14px 16px;
  background:rgba(255,255,255,.02);border-radius:10px;
  border:1px solid var(--border);position:relative;
}
.lyrics-section.regenerating{border-color:var(--gold-dim);background:rgba(201,168,76,.04)}
.lyrics-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lyrics-section-tag{font-family:'Cinzel',serif;color:var(--gold);font-size:13px;font-weight:600;letter-spacing:.1em}
.btn-regen{
  background:transparent;border:1px solid var(--border-bright);
  color:var(--gold);border-radius:6px;
  padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.04em;
  transition:all .15s;display:flex;align-items:center;gap:5px;
}
.btn-regen:hover:not(:disabled){background:rgba(201,168,76,.1)}
.btn-regen:disabled{opacity:.5;cursor:wait}
.btn-regen .spin-icon{display:inline-block;animation:spin 1s linear infinite}
.lyrics-section-content{
  white-space:pre-wrap;font-family:'DM Sans',sans-serif;
  font-size:14px;line-height:1.7;color:var(--text);
}

.style-box{
  margin-top:1.5rem;padding:14px 16px;
  background:rgba(201,168,76,.04);border:1px solid var(--border);border-radius:8px;
}
.style-box-label{
  font-size:12px;color:var(--gold-dim);letter-spacing:.1em;
  font-weight:600;text-transform:uppercase;margin-bottom:6px;
}
.style-box-content{font-size:16px;color:var(--text);line-height:1.6}
.style-box-meta{
  margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
  font-size:15px;color:var(--text-dim);display:flex;gap:18px;flex-wrap:wrap;
}
.style-box-meta strong{color:var(--gold-dim);font-weight:500}
.style-box-meta .num-white{color:#FFFFFF;font-weight:600}

/* ── Refazer estilo musical ──────────────────────── */
.style-restyle{
  margin-top:14px;padding-top:14px;border-top:1px solid var(--border);
}
.style-restyle-hint{
  font-size:12px;color:var(--text-dim);margin-bottom:8px;line-height:1.5;
}
.style-restyle-row{
  display:flex;gap:8px;align-items:stretch;
}
.style-restyle-row input{
  flex:1;background:#0E0E0E;border:1px solid var(--border-bright);
  color:var(--text);border-radius:8px;padding:10px 12px;
  font-family:'DM Sans',sans-serif;font-size:13px;
  transition:border-color .15s;
}
.style-restyle-row input:focus{outline:none;border-color:var(--gold-dim)}
.style-restyle-btn{
  background:rgba(201,168,76,.15);border:1px solid var(--gold-dim);
  color:var(--gold);border-radius:8px;
  padding:0 16px;font-size:13px;font-weight:500;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .15s;white-space:nowrap;
}
.style-restyle-btn:hover:not(:disabled){background:rgba(201,168,76,.25)}
.style-restyle-btn:disabled{opacity:.5;cursor:wait}
.style-restyle-status{font-size:12px;color:var(--text-dim);margin-top:8px;min-height:16px}
.style-restyle-status.success{color:#8FD68F}
.style-restyle-status.error{color:#E89090}
@media(max-width:520px){
  .style-restyle-row{flex-direction:column}
  .style-restyle-btn{padding:10px}
}

.lyrics-actions{margin-top:1.5rem;display:flex;flex-direction:column;gap:1.5rem}
.lyrics-actions .copy-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* mobile: mantém 2 colunas pra economizar espaço */

.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:#121212;border:1px solid var(--gold-dim);
  color:var(--gold);padding:12px 22px;border-radius:8px;
  font-size:13px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.4);
  opacity:0;transition:opacity .25s;pointer-events:none;
}
.toast.show{opacity:1}
.toast.error{border-color:#C25050;color:#E89090}

.history-empty{text-align:center;padding:3rem 1rem;color:var(--text-dim);font-size:14px}

/* ── Histórico: filtros ─────────────────────────────── */
.history-filters{
  display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;
}
.history-filters input{
  flex:1;min-width:200px;background:#0E0E0E;border:1px solid var(--border-bright);
  color:var(--text);border-radius:8px;padding:10px 12px;
  font-family:'DM Sans',sans-serif;font-size:13px;transition:border-color .15s;
}
.history-filters input:focus{outline:none;border-color:var(--gold-dim)}
.history-scope{display:flex;gap:0;border:1px solid var(--border-bright);border-radius:8px;overflow:hidden}
.scope-btn{
  background:transparent;border:none;color:var(--text-dim);
  padding:9px 14px;font-size:12px;font-weight:500;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .15s;
  letter-spacing:.04em;
}
.scope-btn:hover{background:rgba(201,168,76,.08)}
.scope-btn.active{background:rgba(201,168,76,.18);color:var(--gold)}
.history-result-info{font-size:12px;color:var(--text-dim);margin-bottom:10px}
.history-item{
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;margin-bottom:10px;
  cursor:pointer;transition:all .15s;
}
.history-item:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.04)}
.history-item-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;flex-wrap:wrap;gap:6px;
}
.history-item-title{font-family:'Cinzel',serif;color:var(--gold);font-size:14px;font-weight:600;letter-spacing:.04em}
.history-item-date{font-size:11px;color:var(--text-dim)}
.history-item-meta{font-size:12px;color:var(--text-dim);line-height:1.5}
.history-item-meta strong{color:var(--gold-dim)}
.history-item-badge{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:30px;
  background:rgba(201,168,76,.1);color:var(--gold-dim);
  border:.5px solid var(--border-bright);letter-spacing:.06em;
}
.history-item-badge.cost{
  background:rgba(127,184,122,.12);color:#7FB87A;
  border-color:rgba(127,184,122,.3);font-weight:600;
}
.history-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.history-cost{font-size:11px;color:var(--text-dim);font-weight:500}

/* ── Caixa única com a letra completa ── */
.lyrics-full{
  margin-bottom:1.2rem;padding:18px 18px;
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:10px;white-space:pre-wrap;
  font-family:'DM Sans',sans-serif;font-size:18px;
  line-height:1.75;color:var(--text);
}
.lyrics-full.regenerating{border-color:var(--gold-dim);background:rgba(201,168,76,.04);opacity:.7}

/* ── Modificar letra por bloco ── */
.modify-box{margin-bottom:1.5rem}
.modify-hint{font-size:12px;color:var(--text-dim);margin-bottom:10px}
.block-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.block-btn{
  background:transparent;border:1px solid var(--border-bright);
  color:var(--gold);border-radius:8px;padding:10px 6px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.03em;
  transition:all .15s;text-transform:uppercase;
}
.block-btn:hover:not(:disabled){background:rgba(201,168,76,.1)}
.block-btn:disabled{opacity:.4;cursor:wait}
.block-btn.busy{opacity:.6;cursor:wait}
@media(max-width:520px){.block-btn{font-size:12px;padding:10px 4px;letter-spacing:0}}

/* ── Modificar Trecho Específico ────────────────────── */
.excerpt-divider{
  height:1px;background:var(--border);margin:14px 0;
}
.excerpt-row{
  display:flex;gap:8px;align-items:stretch;margin-top:8px;
}
.excerpt-row input{
  flex:1;background:#0E0E0E;border:1px solid var(--border-bright);
  color:var(--text);border-radius:8px;padding:10px 12px;
  font-family:'DM Sans',sans-serif;font-size:13px;
  transition:border-color .15s;
}
.excerpt-row input:focus{outline:none;border-color:var(--gold-dim)}
.excerpt-btn{
  background:rgba(201,168,76,.15);border:1px solid var(--gold-dim);
  color:var(--gold);border-radius:8px;
  padding:0 16px;font-size:13px;font-weight:500;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .15s;white-space:nowrap;
}
.excerpt-btn:hover:not(:disabled){background:rgba(201,168,76,.25)}
.excerpt-btn:disabled{opacity:.5;cursor:wait}
.excerpt-status{font-size:12px;color:var(--text-dim);margin-top:8px;min-height:16px}
.excerpt-status.success{color:#8FD68F}
.excerpt-status.error{color:#E89090}
@media(max-width:520px){
  .excerpt-row{flex-direction:column}
  .excerpt-btn{padding:10px}
}

/* ── Advanced Mode (instrumentos Suno) ── */
.advanced{
  margin-top:1.5rem;border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
}
.advanced-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;cursor:pointer;background:rgba(255,255,255,.02);
  user-select:none;transition:background .15s;
}
.advanced-head:hover{background:rgba(201,168,76,.04)}
.advanced-head .adv-title{
  font-size:13px;font-weight:600;letter-spacing:.1em;
  color:var(--gold-dim);text-transform:uppercase;
}
.advanced-head .adv-arrow{color:var(--gold-dim);transition:transform .2s;font-size:16px}
.advanced.open .adv-arrow{transform:rotate(180deg)}
.advanced-body{display:none;padding:16px;border-top:1px solid var(--border)}
.advanced.open .advanced-body{display:block;animation:fadeIn .25s}
.adv-desc{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:14px}
.adv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
@media(max-width:520px){.adv-grid{grid-template-columns:1fr}}
.adv-field label{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;flex-wrap:wrap;
  font-size:13px;font-weight:600;letter-spacing:.08em;
  color:var(--gold-dim);margin-bottom:5px;text-transform:uppercase;
}
.adv-repeat{
  background:transparent;border:1px solid var(--border-bright);
  color:var(--gold);border-radius:6px;padding:3px 8px;
  font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.02em;
  font-family:'DM Sans',sans-serif;text-transform:none;transition:all .15s;
  white-space:nowrap;
}

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://lux-music.plataformalux.workers.dev';
const FIGURINHAS_URL = 'https://lux-figurinhas.plataformalux.workers.dev';

let currentOrder = null;
let compressedImage = null;
let currentAtendente = '';

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'history') loadHistory();
  });
});

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

async function initAtendente() {
  const label = document.getElementById('atendenteLabel'); // pode não existir mais
  const setLabel = (txt) => { if (label) label.textContent = txt; };
  try {
    let tries = 0;
    while (!window.__luxFetch && tries < 50) {
      await new Promise(r => setTimeout(r, 100));
      tries++;
    }
    if (!window.__luxFetch) {
      setLabel('(recarregue)');
      return;
    }
    const resp = await window.__luxFetch(FIGURINHAS_URL + '/admin/me');
    const data = await resp.json();
    if (data.ok && data.user) {
      currentAtendente = data.user.name || data.user.email || 'Atendente';
      setLabel(currentAtendente);
    } else {
      setLabel('Atendente');
    }
  } catch (e) {
    setLabel('(erro)');
  }
}
initAtendente();

// ── BOTÕES LIXEIRA (limpar Briefing / Instruções) ─────────────
function attachClearTextButton(textareaId, buttonId) {
  const ta  = document.getElementById(textareaId);
  const btn = document.getElementById(buttonId);
  if (!ta || !btn) return;
  const sync = () => btn.classList.toggle('visible', ta.value.trim().length > 0);
  ta.addEventListener('input', sync);
  btn.addEventListener('click', () => {
    if (!ta.value) return;
    if (ta.value.trim().length > 20 && !confirm('Apagar todo o conteúdo deste campo?')) return;
    ta.value = '';
    sync();
    ta.focus();
  });
  sync(); // estado inicial
}
attachClearTextButton('briefing',   'btnClearBriefing');
attachClearTextButton('instrucoes', 'btnClearInstrucoes');

const imageInput   = document.getElementById('imageInput');
const imagePreview = document.getElementById('imagePreview');
const imagePreviewImg = document.getElementById('imagePreviewImg');
const removeImgBtn = document.getElementById('removeImg');

imageInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    showToast('Imagem maior que 10MB. Use uma menor.', true);
    imageInput.value = '';
    return;
  }
  try {
    const { base64, mime, dataUrl } = await compressImage(file);
    compressedImage = { base64, mime };
    imagePreviewImg.src = dataUrl;
    imagePreview.classList.add('has-img');
    showToast('✓ Imagem carregada');
  } catch (err) {
    showToast('Erro ao processar imagem: ' + err.message, true);
    imageInput.value = '';
  }
});

removeImgBtn.addEventListener('click', () => {
  compressedImage = null;
  imageInput.value = '';
  imagePreview.classList.remove('has-img');
});

// ── COLAR IMAGEM (Ctrl+V) ─────────────────────────────────────
// Captura imagem da área de transferência quando a aba "Novo Pedido" está ativa.
// Funciona com print de tela, foto copiada do WhatsApp Web, etc.
// ── RITMOS FAVORITOS ──────────────────────────────────────────
// Guardados no KV LUX_USERS via Worker (endpoints /prefs/favoriteRitmos)
let favoriteRitmos = [];

async function loadFavorites() {
  try {
    let tries = 0;
    while (!window.__luxFetch && tries < 50) {
      await new Promise(r => setTimeout(r, 100));
      tries++;
    }
    if (!window.__luxFetch) return;
    const resp = await window.__luxFetch(API_URL + '/prefs/favoriteRitmos');
    const data = await resp.json();
    if (data.ok && Array.isArray(data.favorites)) {
      favoriteRitmos = data.favorites;
      updateSaveButtonState();
    }
  } catch (e) { /* silencioso, favoritos não são críticos */ }
}
loadFavorites();

function updateSaveButtonState() {
  const inp = document.getElementById('ritmo');
  const btn = document.getElementById('btnSaveFav');
  if (!inp || !btn) return;
  const current = inp.value.trim().toLowerCase();
  const isSaved = current && favoriteRitmos.some(r => r.toLowerCase() === current);
  btn.classList.toggle('saved', !!isSaved);
  btn.title = isSaved ? 'Já está nos favoritos' : 'Salvar como favorito';
}

document.getElementById('ritmo').addEventListener('input', updateSaveButtonState);

document.getElementById('btnSaveFav').addEventListener('click', async () => {
  const inp = document.getElementById('ritmo');
  const ritmo = inp.value.trim();
  if (!ritmo) { showToast('Digite um ritmo antes de salvar.', true); return; }
  if (favoriteRitmos.some(r => r.toLowerCase() === ritmo.toLowerCase())) {
    showToast('Já está nos favoritos.', true);
    return;
  }
  if (favoriteRitmos.length >= 20) {
    showToast('Limite de 20 favoritos atingido. Remova algum antes.', true);
    return;
  }
  const btn = document.getElementById('btnSaveFav');
  btn.disabled = true;
  try {
    const resp = await window.__luxFetch(API_URL + '/prefs/favoriteRitmos', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action: 'add', ritmo })
    });
    const data = await resp.json();
    if (!data.ok) { showToast('Erro: ' + (data.error || 'falha ao salvar'), true); return; }
    favoriteRitmos = data.favorites || [];
    showToast('⭐ Salvo como favorito');
    updateSaveButtonState();
  } catch (err) {
    showToast('Erro de rede: ' + err.message, true);
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('btnShowFav').addEventListener('click', () => {
  const dd = document.getElementById('favDropdown');
  const isOpen = dd.classList.contains('show');
  renderFavorites();
  dd.classList.toggle('show', !isOpen);
});

// Fecha o dropdown se clicar fora
document.addEventListener('click', (e) => {
  const dd = document.getElementById('favDropdown');
  const wrap = e.target.closest('.ritmo-wrapper');
  if (!wrap && dd) dd.classList.remove('show');
});

function renderFavorites() {
  const dd = document.getElementById('favDropdown');
  if (!favoriteRitmos.length) {
    dd.innerHTML = '<div class="fav-empty">Você ainda não tem ritmos favoritos.<br/>Digite um e clique em ⭐</div>';
    return;
  }
  let html = '';
  favoriteRitmos.forEach((r, idx) => {
    html += `
      <div class="fav-item" data-idx="${idx}">
        <span class="fav-item-text" title="${escapeHtml(r)}">${escapeHtml(r)}</span>
        <button type="button" class="fav-item-remove" data-remove="${idx}" title="Remover">✕</button>
      </div>
    `;
  });
  dd.innerHTML = html;

  dd.querySelectorAll('.fav-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('fav-item-remove')) return;
      const idx = Number(el.dataset.idx);
      document.getElementById('ritmo').value = favoriteRitmos[idx];
      dd.classList.remove('show');
      updateSaveButtonState();
    });
  });
  dd.querySelectorAll('.fav-item-remove').forEach(b => {
    b.addEventListener('click', async (e) => {
      e.stopPropagation();
      const idx = Number(b.dataset.remove);
      const ritmo = favoriteRitmos[idx];
      if (!ritmo) return;
      try {
        const resp = await window.__luxFetch(API_URL + '/prefs/favoriteRitmos', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ action: 'remove', ritmo })
        });
        const data = await resp.json();
        if (data.ok) {
          favoriteRitmos = data.favorites || [];
          renderFavorites();
          updateSaveButtonState();
          showToast('Removido dos favoritos');
        } else {
          showToast('Erro ao remover', true);
        }
      } catch (err) {
        showToast('Erro de rede: ' + err.message, true);
      }
    });
  });
}

document.addEventListener('paste', async (e) => {
  // Só processa se a aba Novo Pedido estiver ativa
  const tabNew = document.getElementById('tab-new');
  if (!tabNew || !tabNew.classList.contains('active')) return;

  const items = (e.clipboardData || e.originalEvent?.clipboardData)?.items;
  if (!items) return;

  for (const item of items) {
    if (item.type && item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (!file) continue;
      if (file.size > 10 * 1024 * 1024) {
        showToast('Imagem maior que 10MB. Use uma menor.', true);
        return;
      }
      try {
        const { base64, mime, dataUrl } = await compressImage(file);
        compressedImage = { base64, mime };
        imagePreviewImg.src = dataUrl;
        imagePreview.classList.add('has-img');
        showToast('✓ Imagem colada');
      } catch (err) {
        showToast('Erro ao processar imagem colada: ' + err.message, true);
      }
      return;
    }
  }
});

// ── GRAVADOR DE ÁUDIO (Instruções) ──────────────────────────
// Usa MediaRecorder do browser → manda webm pra Whisper API.
// Custo: ~US$0,006/min. Limite: 2min/gravação.
const MIC_MAX_SECONDS = 120; // 2 minutos

let mediaRecorder = null;
let micChunks = [];
let micStartTime = 0;
let micTimer = null;
let micStream = null;
let micCancelled = false;

const micBtn       = document.getElementById('micBtn');
const micState     = document.getElementById('micState');
const micTime      = document.getElementById('micTime');
const micStopBtn   = document.getElementById('micStopBtn');
const micCancelBtn = document.getElementById('micCancelBtn');
const micStatus    = document.getElementById('micStatus');

function formatMicTime(secs) {
  const m = Math.floor(secs / 60).toString().padStart(2, '0');
  const s = Math.floor(secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function micSetStatus(text, kind) {
  if (!micStatus) return;
  micStatus.className = 'mic-status' + (kind ? ' ' + kind : '');
  micStatus.textContent = text || '';
}

function micCleanupStream() {
  if (micStream) {
    try { micStream.getTracks().forEach(t => t.stop()); } catch (e) {}
    micStream = null;
  }
  if (micTimer) { clearInterval(micTimer); micTimer = null; }
  mediaRecorder = null;
  micChunks = [];
}

if (micBtn) {
  micBtn.addEventListener('click', async () => {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      micSetStatus('Seu navegador não suporta gravação de áudio.', 'error');
      return;
    }
    micCancelled = false;
    micSetStatus('');

    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      // Erro comum: usuário negou permissão
      let msg = 'Não consegui acessar o microfone.';
      if (err.name === 'NotAllowedError') msg = 'Permissão de microfone negada. Libere nas configurações do navegador.';
      else if (err.name === 'NotFoundError') msg = 'Nenhum microfone encontrado no dispositivo.';
      micSetStatus(msg, 'error');
      return;
    }

    // Escolhe mime que o browser suporta (preferindo webm/opus)
    let mime = '';
    const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', 'audio/mp4'];
    for (const c of candidates) {
      if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) { mime = c; break; }
    }

    try {
      mediaRecorder = mime
        ? new MediaRecorder(micStream, { mimeType: mime })
        : new MediaRecorder(micStream);
    } catch (err) {
      micSetStatus('Erro ao iniciar gravação: ' + err.message, 'error');
      micCleanupStream();
      return;
    }

    micChunks = [];
    mediaRecorder.addEventListener('dataavailable', (e) => {
      if (e.data && e.data.size > 0) micChunks.push(e.data);
    });

    mediaRecorder.addEventListener('stop', async () => {
      const stream = micStream;       // captura ref antes do cleanup
      const wasCancelled = micCancelled;
      const finalMime = mediaRecorder?.mimeType || mime || 'audio/webm';
      const chunks = micChunks.slice();
      micCleanupStream();

      // Reseta UI
      micState.style.display = 'none';
      micBtn.style.display = '';

      if (wasCancelled || !chunks.length) {
        micSetStatus('');
        return;
      }

      // Envia pro Whisper
      const blob = new Blob(chunks, { type: finalMime });
      if (blob.size < 1000) {
        micSetStatus('Áudio muito curto.', 'error');
        return;
      }
      micSetStatus('✨ Transcrevendo áudio...', 'transcribing');
      micBtn.disabled = true;

      try {
        const audioBase64 = await blobToBase64(blob);
        const resp = await window.__luxFetch(API_URL + '/transcribeAudio', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audioBase64, mime: finalMime })
        });
        const data = await resp.json();
        if (!data.ok) {
          micSetStatus('Erro: ' + (data.error || 'falha na transcrição'), 'error');
          return;
        }
        const transcript = (data.text || '').trim();
        if (!transcript) {
          micSetStatus('Áudio sem fala identificada.', 'error');
          return;
        }
        // Concatena no textarea (não substitui)
        const ta = document.getElementById('instrucoes');
        const cur = ta.value.trim();
        ta.value = cur
          ? cur + '\n\n' + transcript
          : transcript;
        ta.focus();
        // Coloca cursor no final
        try { ta.setSelectionRange(ta.value.length, ta.value.length); } catch (_) {}
        micSetStatus('✓ Transcrito (' + transcript.length + ' caracteres).', 'success');
        setTimeout(() => micSetStatus(''), 4000);
      } catch (err) {
        micSetStatus('Erro de rede: ' + err.message, 'error');
      } finally {
        micBtn.disabled = false;
      }
    });

    // Inicia gravação
    mediaRecorder.start();
    micStartTime = Date.now();
    micBtn.style.display = 'none';
    micState.style.display = 'flex';
    micTime.textContent = '00:00';

    micTimer = setInterval(() => {
      const secs = (Date.now() - micStartTime) / 1000;
      micTime.textContent = formatMicTime(secs);
      if (secs >= MIC_MAX_SECONDS) {
        // Para automaticamente no limite
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          micCancelled = false;
          mediaRecorder.stop();
        }
      }
    }, 250);
  });
}

if (micStopBtn) {
  micStopBtn.addEventListener('click', () => {
    micCancelled = false;
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  });
}

if (micCancelBtn) {
  micCancelBtn.addEventListener('click', () => {
    micCancelled = true;
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  });
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = String(reader.result || '');
      const idx = dataUrl.indexOf(',');
      resolve(idx >= 0 ? dataUrl.slice(idx + 1) : dataUrl);
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(blob);
  });
}

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        const base64  = dataUrl.split(',')[1];
        resolve({ base64, mime: 'image/jpeg', dataUrl });
      };
      img.onerror = () => reject(new Error('Imagem inválida'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Erro ao ler arquivo'));
    reader.readAsDataURL(file);
  });
}

document.getElementById('btnGerar').addEventListener('click', async () => {
  const briefing  = document.getElementById('briefing').value.trim();
  const instrucoes = document.getElementById('instrucoes').value.trim();
  const ritmo     = document.getElementById('ritmo').value.trim();
  const status    = document.getElementById('statusGerar');

  if (!briefing && !compressedImage) {
    showToast('Preencha o briefing ou envie uma imagem.', true);
    return;
  }
  if (!ritmo) { showToast('Preencha o ritmo.', true); return; }

  const btn = document.getElementById('btnGerar');
  btn.disabled = true;
  status.className = 'status-box show loading';
  status.textContent = 'Gerando letra com IA... pode levar até 30 segundos.';

  try {
    const body = { briefing, ritmo, instrucoes };
    if (compressedImage) {
      body.imageBase64 = compressedImage.base64;
      body.imageMime   = compressedImage.mime;
    }

    const resp = await window.__luxFetch(API_URL + '/createOrder', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body)
    });
    const data = await resp.json();

    if (!data.ok) {
      status.className = 'status-box show error';
      status.textContent = '✘ ' + (data.error || 'Erro desconhecido');
      btn.disabled = false;
      return;
    }

    currentOrder = {
      orderId:    data.orderId,
      briefing,
      instrucoes,
      ritmo,

  }
});

// Atualiza a caixa única de letra a partir do currentOrder
function refreshLyricsBox() {
  const sections = parseLyrics(currentOrder.result.lyrics);
  const box = document.getElementById('lyricsFull');
  if (box) box.textContent = sections.map(s => `[${s.name}]\n${s.body}`).join('\n\n');
}

function parseLyrics(text) {
  if (!text) return [];

  // Quebra em blocos a cada linha que começa com [
  const rawParts = text.split(/\n(?=\[)/);
  const blocks = rawParts.map(block => {
    const m = block.match(/^\[([^\]]+)\]\s*\n?([\s\S]*)$/);
    if (!m) return { name: 'Section', body: block.trim() };
    return { name: m[1].trim(), body: m[2].trim() };
  });

  // Funde [Spoken Word ...] dentro do [Outro] que vem antes
  const merged = [];
  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    const nameLower = b.name.toLowerCase();
    const isSpoken = nameLower.startsWith('spoken') || nameLower.includes('locuç');

    if (isSpoken && merged.length > 0 &&
        merged[merged.length - 1].name.toLowerCase() === 'outro') {
      // Funde com o Outro anterior
      const prev = merged[merged.length - 1];
      const spokenContent = `[${b.name}]\n${b.body}`.trim();
      prev.body = prev.body
        ? `${prev.body}\n${spokenContent}`
        : spokenContent;
    } else {
      merged.push(b);
    }
  }
  return merged;
}

// Regenera UM bloco pelo nome (Verse/Chorus/Bridge/Outro).
// Reusa o endpoint /regenerateSection que já existe e funciona.
// Se houver vários blocos com o mesmo nome, regenera o primeiro.
async function regenerateBlock(blockName, btn) {
  if (!currentOrder) return;
  const sections = parseLyrics(currentOrder.result.lyrics);
  const idx = sections.findIndex(s => s.name.toLowerCase() === blockName.toLowerCase());
  if (idx === -1) {
    showToast('Esta letra não tem bloco "' + blockName + '".', true);
    return;
  }

  const allBtns = document.querySelectorAll('.block-btn');
  allBtns.forEach(b => b.disabled = true);
  btn.classList.add('busy');
  const original = btn.textContent;
  btn.textContent = '...';
  const box = document.getElementById('lyricsFull');
  if (box) box.classList.add('regenerating');

  try {
    const resp = await window.__luxFetch(API_URL + '/regenerateSection', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        orderId:     currentOrder.orderId,
        sectionName: sections[idx].name,
        lyrics:      currentOrder.result.lyrics,
        briefing:    currentOrder.briefing,
        instrucoes:  currentOrder.instrucoes || ''
      })
    });
    const data = await resp.json();
    if (!data.ok) {
      showToast('Erro ao modificar: ' + data.error, true);
    } else {
      currentOrder.result.lyrics = data.lyrics;
      refreshLyricsBox();
      showToast('✓ ' + blockName + ' modificado');
    }
  } catch (err) {
    showToast('Erro de rede: ' + err.message, true);
  } finally {
    allBtns.forEach(b => b.disabled = false);
    btn.classList.remove('busy');
    btn.textContent = original;
    if (box) box.classList.remove('regenerating');
  }
}

// Modifica um trecho específico da letra (palavra ou frase).
// Envia trecho + letra atual + contexto pra IA, que devolve a letra
// com APENAS a linha que contém o trecho alterada.
async function modifyExcerpt() {
  if (!currentOrder) return;
  const input  = document.getElementById('excerptInput');
  const btn    = document.getElementById('btnModifyExcerpt');
  const status = document.getElementById('excerptStatus');
  const trecho = (input.value || '').trim();

  if (!trecho) {
    status.className = 'excerpt-status error';
    status.textContent = '✘ Cole o trecho que quer modificar.';
    return;
  }
  if (trecho.length < 3) {
    status.className = 'excerpt-status error';
    status.textContent = '✘ Trecho muito curto (mínimo 3 caracteres).';
    return;
  }

  // Verificar se o trecho existe na letra (case-insensitive)
  const letraAtual = currentOrder.result.lyrics || '';
  if (!letraAtual.toLowerCase().includes(trecho.toLowerCase())) {
    status.className = 'excerpt-status error';
    status.textContent = '✘ Esse trecho não foi encontrado na letra atual.';
    return;
  }

  btn.disabled = true;
  status.className = 'excerpt-status';
  status.textContent = '✨ Modificando trecho... aguarde uns segundos.';

  const box = document.getElementById('lyricsFull');
  if (box) box.classList.add('regenerating');

  try {
    const resp = await window.__luxFetch(API_URL + '/modifyExcerpt', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        orderId:    currentOrder.orderId,
        excerpt:    trecho,
        lyrics:     letraAtual,
        briefing:   currentOrder.briefing || '',
        instrucoes: currentOrder.instrucoes || ''
      })
    });
    const data = await resp.json();
    if (!data.ok) {
      status.className = 'excerpt-status error';
      status.textContent = '✘ ' + (data.error || 'Erro desconhecido');
      return;
    }
    currentOrder.result.lyrics = data.lyrics;
    refreshLyricsBox();
    status.className = 'excerpt-status success';
    status.textContent = '✓ Trecho modificado. ' + (data.message || '');
    input.value = '';
  } catch (err) {
    status.className = 'excerpt-status error';
    status.textContent = '✘ Erro de rede: ' + err.message;
  } finally {
    btn.disabled = false;
    if (box) box.classList.remove('regenerating');
  }
}

// Refazer estilo musical (style_prompt + weirdness + style_influence)
// sem mexer na letra. Atendente quer mudar de Funk pra Forró sem regerar.
async function refazerEstilo() {

  const input  = document.getElementById('newRitmoInput');
  const btn    = document.getElementById('btnRefazerEstilo');
  const status = document.getElementById('styleRestyleStatus');
  const novoRitmo = (input.value || '').trim();

  if (!novoRitmo) {
    status.className = 'style-restyle-status error';
    status.textContent = '✘ Digite o novo ritmo/estilo.';
    return;
  }
  if (novoRitmo.length < 3) {
    status.className = 'style-restyle-status error';
    status.textContent = '✘ Ritmo muito curto.';
    return;
  }

  btn.disabled = true;
  status.className = 'style-restyle-status';
  status.textContent = '✨ Gerando novo estilo... aguarde.';

  try {
    const resp = await window.__luxFetch(API_URL + '/restyle', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        orderId:  currentOrder.orderId,
        ritmo:    novoRitmo,
        briefing: currentOrder.briefing || ''
      })
    });

    if (!data.ok) {
      status.className = 'style-restyle-status error';
      status.textContent = '✘ ' + (data.error || 'Erro desconhecido');
      return;
    }
    // Atualiza UI sem regerar a tela toda
    currentOrder.result.style_prompt    = data.style_prompt;
    currentOrder.result.weirdness       = data.weirdness;
    currentOrder.result.style_influence = data.style_influence;
    currentOrder.ritmo                  = novoRitmo;

    const el2 = document.getElementById('styleWeirdness');
    const el3 = document.getElementById('styleInfluence');
    if (el1) el1.textContent = data.style_prompt;
    if (el2) el2.textContent = data.weirdness;
    if (el3) el3.textContent = data.style_influence;

    status.className = 'style-restyle-status success';
    status.textContent = '✓ Estilo atualizado.';
    setTimeout(() => { status.textContent = ''; status.className = 'style-restyle-status'; }, 4000);
  } catch (err) {
    status.className = 'style-restyle-status error';
    status.textContent = '✘ Erro de rede: ' + err.message;
  } finally {
    btn.disabled = false;
  }

// Cache local dos pedidos (pra filtrar no front sem chamar API)
let _historyCache = [];
let _historyScope = 'mine'; // 'mine' ou 'all'
let _isAdmin = false;
let _myEmail = '';

async function loadHistory() {
  const c = document.getElementById('historyContent');
  c.innerHTML = '<div class="history-empty">Carregando...</div>';
  try {
    // limit=200 pra busca ter resultados ricos
    const resp = await window.__luxFetch(API_URL + '/listOrders?limit=200');
    const data = await resp.json();
    if (!data.ok) {
      c.innerHTML = '<div class="history-empty">Erro: ' + escapeHtml(data.error || '') + '</div>';
      return;
    }
    _historyCache = Array.isArray(data.orders) ? data.orders : [];

    // Detecta se é admin (pelo Worker, na primeira carga)
    try {
      const meResp = await window.__luxFetch(FIGURINHAS_URL + '/admin/me');
      const meData = await meResp.json();
      if (meData.ok && meData.user) {
        _isAdmin = (meData.user.role === 'admin');
        _myEmail = (meData.user.email || '').toLowerCase();
      }
    } catch (e) { /* ignora — usuário normal */ }

    // Mostra toggle "Só meus / Todos" só pra admin
    const scopeBox = document.getElementById('historyScopeBox');
    if (scopeBox) scopeBox.style.display = _isAdmin ? 'flex' : 'none';

    renderHistoryList();
  } catch (err) {
    c.innerHTML = '<div class="history-empty">Erro de rede: ' + escapeHtml(err.message) + '</div>';
  }
}

function renderHistoryList() {
  const c = document.getElementById('historyContent');
  const search = (document.getElementById('historySearch')?.value || '').toLowerCase().trim();

  // 1) Filtra por escopo (só meus / todos)
  let list = _historyCache;
  if (_isAdmin && _historyScope === 'mine' && _myEmail) {
    list = list.filter(o => (o.attendantEmail || '').toLowerCase() === _myEmail);
  }
  // (Atendente normal: Worker já filtra no /listOrders, vê só os seus)

  // 2) Filtra por busca (case-insensitive em nome do cliente, ritmo, atendente)
  if (search) {
    list = list.filter(o => {
      const hay = [
        o.clientName, o.musicaNome, o.ritmo,
        o.attendantName, o.briefing
      ].map(x => (x || '').toLowerCase()).join(' | ');
      return hay.includes(search);
    });
  }

  if (!list.length) {
    if (!_historyCache.length) {
      c.innerHTML = '<div class="history-empty">Nenhum pedido ainda. Gere sua primeira letra!</div>';
    } else {
      c.innerHTML = '<div class="history-empty">Nenhum resultado pra "' + escapeHtml(search) + '"</div>';
    }
    return;
  }

  const infoTxt = search || (_isAdmin && _historyScope === 'all')
    ? `<div class="history-result-info">Mostrando ${list.length} de ${_historyCache.length} pedido(s)</div>`
    : '';

  let html = infoTxt;
  list.forEach(o => {
    const custoTxt = (o.costBRL != null)
      ? `<div class="history-cost">R$ ${Number(o.costBRL).toFixed(2).replace('.', ',')}</div>`
      : '';
    const atendBadge = (_isAdmin && _historyScope === 'all' && o.attendantName)
      ? ` <span class="history-item-badge">👤 ${escapeHtml(o.attendantName)}</span>`
      : '';
    html += `
      <div class="history-item" data-order-id="${escapeHtml(o.orderId)}">
        <div class="history-item-top">
          <span class="history-item-title">${escapeHtml(o.clientName || o.musicaNome || '(sem nome)')}</span>
          <div class="history-right">
            <span class="history-item-date">${escapeHtml(o.createdAt || '')}</span>
            ${custoTxt}
          </div>
        </div>
        <div class="history-item-meta">
          ${escapeHtml(o.ritmo || '-')}
          ${o.hasImage ? ' <span class="history-item-badge">📎 c/ imagem</span>' : ''}
          ${o.regenerations ? ' <span class="history-item-badge">↻ ' + o.regenerations + 'x</span>' : ''}
          ${atendBadge}
        </div>
      </div>
    `;
  });
  c.innerHTML = html;
  c.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => openHistoryOrder(el.dataset.orderId));
  });
}

// Handlers da busca e do toggle (registra uma vez ao carregar)
document.addEventListener('DOMContentLoaded', () => {
  const search = document.getElementById('historySearch');
  if (search) {
    search.addEventListener('input', () => renderHistoryList());
  }
  document.querySelectorAll('.scope-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _historyScope = btn.dataset.scope;
      renderHistoryList();
    });
  });
});

async function openHistoryOrder(orderId) {
  try {
    const resp = await window.__luxFetch(API_URL + '/getOrder?orderId=' + encodeURIComponent(orderId));
    const data = await resp.json();
    if (!data.ok) { showToast('Erro: ' + data.error, true); return; }
    const o = data.order;
    currentOrder = {
      orderId:    o.orderId,
      briefing:   o.briefing,
      instrucoes: o.instrucoes || '',
      ritmo:      o.ritmo,
      clientName: o.clientName,
      result:     o.result,
      costBRL:    o.costBRL ?? null
    };
    renderLyrics(currentOrder);
    document.getElementById('tab-lyrics-btn').style.display = '';
    document.querySelector('[data-tab="lyrics"]').click();
  } catch (err) {
    showToast('Erro: ' + err.message, true);
  }
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
