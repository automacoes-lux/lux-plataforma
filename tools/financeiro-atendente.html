<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lux — Financeiro</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="../css/theme.css"/>
<script src="../js/auth-iframe.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg-card:#121212;--bg-input:#1C1C1C;--text-mid:#B0A080;--ok:#7FB87A;--danger:#E87A7A}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:17px;
  background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(201,168,76,0.07) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 90% 110%,rgba(201,168,76,0.04) 0%,transparent 60%);
}
.container{max-width:840px;margin:0 auto;padding:1.6rem 1.4rem 5rem}
.page-title{font-family:'Cinzel',serif;font-size:18px;letter-spacing:.1em;color:var(--gold);font-weight:600}
.page-sub{font-size:14px;color:var(--text-dim);margin-top:5px}

.card{background:var(--bg-card);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1.4rem;margin-bottom:1.1rem}
.card-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:#FFF;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.1rem;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:.5px;background:linear-gradient(90deg,var(--border) 0%,transparent 100%)}

/* caixa verde — acumulado da semana */
.week-card{background:linear-gradient(135deg,rgba(127,184,122,.22),rgba(127,184,122,.04));border:1px solid rgba(127,184,122,.5);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.1rem;box-shadow:0 8px 28px rgba(127,184,122,.14)}
.week-label{font-size:13px;color:#9be79a;letter-spacing:.06em;text-transform:uppercase;font-family:'Cinzel',serif;font-weight:600}
.week-value{font-family:'Cinzel',serif;font-size:36px;font-weight:700;color:#cdeccb;margin:4px 0 12px;text-shadow:0 2px 12px rgba(127,184,122,.25)}
.week-chart{width:100%;height:96px;display:block;overflow:visible}
.week-days{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text-dim)}
.week-days span{flex:1;text-align:center}

/* caixa branca — lucro diário do mês (igual ao admin) */
.month-card{background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.5);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.1rem;box-shadow:0 8px 28px rgba(255,255,255,.08)}
.month-label{font-size:13px;color:#f0f0f0;letter-spacing:.06em;text-transform:uppercase;font-family:'Cinzel',serif;font-weight:600}
.month-value{font-family:'Cinzel',serif;font-size:32px;font-weight:700;color:#fff;margin:4px 0 12px;text-shadow:0 2px 12px rgba(255,255,255,.18)}
.month-value .mv-sub{font-size:14px;color:var(--text-dim);font-weight:400;letter-spacing:0}
.month-days{display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:var(--text-dim);line-height:1.1}
.month-days span{flex:1;text-align:center;min-width:0;display:flex;flex-direction:column;align-items:center}
.month-days span i{font-style:normal;font-size:7px;opacity:.6;margin-top:1px;text-transform:lowercase}
/* botão "Semana atual" no verde do gráfico */
.fin-mode-btn.greenbtn{border-color:rgba(127,184,122,.5);color:#9be79a}
.fin-mode-btn.greenbtn.active{background:rgba(127,184,122,.18);border-color:rgba(127,184,122,.75);color:#cdeccb}

.fin-mode-toggle{display:flex;gap:6px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.fin-mode-btn{background:transparent;border:.5px solid var(--border);color:var(--text-dim);padding:10px 16px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.fin-mode-btn.active{background:rgba(201,168,76,.12);border-color:var(--border-bright);color:var(--gold)}
.fin-nav{display:flex;align-items:center;justify-content:center;gap:14px}
.fin-nav button{background:transparent;border:1px solid var(--border-bright);color:var(--gold);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px}
.fin-nav .lbl{font-family:'Cinzel',serif;color:var(--gold);font-size:16px;min-width:200px;text-align:center}
.fin-date-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-top:10px}
.fin-date-row .f{flex:1;min-width:120px}
.field label{font-size:13px;color:var(--gold-dim);display:block;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;font-family:'Cinzel',serif;font-weight:600}
.field input{width:100%;padding:11px 13px;font-size:16px;background:var(--bg-input);color:var(--text);border:.5px solid var(--border);border-radius:var(--radius);outline:none}
.btn-secondary{padding:11px 16px;background:transparent;color:var(--text);border:.5px solid var(--border-bright);border-radius:var(--radius);font-size:15px;cursor:pointer}

.breakdown{display:flex;flex-direction:column;gap:3px}
.bd-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:rgba(255,255,255,.02);border:.5px solid var(--border);border-radius:var(--radius);font-size:16px}
.bd-row .k{color:var(--text-mid);display:flex;align-items:center;gap:8px}
.bd-row .v{font-variant-numeric:tabular-nums;font-weight:600}
.bd-row.neg .v{color:var(--danger)}
.bd-row.sub{background:rgba(255,255,255,.04)}
.bd-row.sub .k,.bd-row.sub .v{color:var(--text)}
.bd-row.inc{padding:9px 16px 9px 28px;font-size:14px;background:transparent;border-style:dashed}
.bd-row.inc .k{color:var(--text-dim)}
.bd-row.inc .k small{font-size:12px;color:var(--text-dim)}
.bd-row.inc .v{color:var(--text-mid);font-weight:600}
.bd-note{text-align:center;font-size:13px;color:var(--text-dim);padding:4px 0}
.bd-row.final{background:rgba(201,168,76,.1);border-color:var(--border-bright);margin-top:4px}
.bd-row.final .k{color:var(--gold);font-weight:600}
.bd-row.final .v{color:var(--gold);font-family:'Cinzel',serif;font-size:22px}

.day-toggle{margin-top:12px;text-align:center}
.day-toggle button{background:none;border:none;color:var(--gold-dim);font-size:14px;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.04em}
.day-list{margin-top:10px;display:none}
.day-list.show{display:block;animation:fadeIn .2s ease both}
.day-item{display:grid;grid-template-columns:1fr auto auto;gap:12px;padding:10px 12px;border-bottom:.5px solid rgba(255,255,255,.04);font-size:14px;color:var(--text-dim)}
.day-item .liq{color:var(--gold);font-weight:600;text-align:right;min-width:90px}
.day-item .ent{text-align:right;min-width:90px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.rec-box{max-height:380px;overflow-y:auto;border:.5px solid var(--border);border-radius:var(--radius);margin-top:6px}
.rec-item{display:grid;grid-template-columns:1.6fr 1fr .8fr auto;gap:10px;padding:10px 13px;border-bottom:.5px solid rgba(255,255,255,.04);font-size:14px;align-items:center}
.rec-item:last-child{border-bottom:none}
.rec-item.head{position:sticky;top:0;background:#161616;font-size:12px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.04em}
.rec-item .rn{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.rec-item .rd,.rec-item .rh{color:var(--text-dim);text-align:right;font-variant-numeric:tabular-nums}
.rec-item .rv{color:var(--ok);text-align:right;font-weight:600;font-variant-numeric:tabular-nums}

.trophy-card{border-radius:var(--radius-lg);padding:1.5rem 1.2rem;text-align:center;margin-bottom:1rem;border:1px solid var(--border-bright)}
.trophy-card.t1{background:linear-gradient(135deg,rgba(201,168,76,.22),rgba(201,168,76,.05));border-color:rgba(201,168,76,.7)}
.trophy-card.t2{background:linear-gradient(135deg,rgba(200,200,210,.16),rgba(200,200,210,.03));border-color:rgba(200,200,210,.5)}
.trophy-card.t3{background:linear-gradient(135deg,rgba(205,127,50,.16),rgba(205,127,50,.03));border-color:rgba(205,127,50,.5)}
.trophy-card.last{background:linear-gradient(135deg,rgba(232,122,122,.1),rgba(232,122,122,.02));border-color:rgba(232,122,122,.4)}
.trophy-emoji{font-size:52px;line-height:1;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.trophy-pos{font-family:'Cinzel',serif;font-size:15px;letter-spacing:.08em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.trophy-card.t2 .trophy-pos{color:#C8C8D2}.trophy-card.t3 .trophy-pos{color:#E2A86A}.trophy-card.last .trophy-pos{color:var(--danger)}
.trophy-msg{font-size:16px;color:var(--text);line-height:1.6;max-width:540px;margin:0 auto}
.trophy-val{margin-top:10px;font-family:'Cinzel',serif;font-size:22px;color:var(--gold);font-weight:700}

.rank-list{display:flex;flex-direction:column;gap:7px;margin-top:1rem}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 15px;background:rgba(255,255,255,.02);border:.5px solid var(--border);border-radius:var(--radius)}
.rank-row.me{background:rgba(201,168,76,.1);border-color:var(--border-bright);box-shadow:0 0 0 1px rgba(201,168,76,.2)}
.rank-pos{width:32px;height:32px;border-radius:50%;background:rgba(201,168,76,.12);color:var(--gold);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Cinzel',serif}
.rank-row.me .rank-pos{background:var(--gold);color:#1A1A1A}
.rank-name{flex:1;min-width:0;font-size:16px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-name .you{font-size:11px;color:var(--gold-dim);margin-left:6px}
.dupla-tag{font-size:10px;padding:1px 7px;border-radius:20px;background:rgba(127,184,122,.15);color:#7FB87A;border:.5px solid rgba(127,184,122,.4);margin-left:6px;vertical-align:middle}
.rank-val small{color:var(--text-dim);font-weight:500;font-size:12px}
.rank-medal{font-size:20px;flex-shrink:0}
.rank-val{font-variant-numeric:tabular-nums;color:var(--gold-dim);font-size:15px;font-weight:600;flex-shrink:0}

.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.6rem 1rem;color:var(--text-dim);text-align:center;gap:10px;font-size:15px}
.state-msg .icon{font-size:30px;opacity:.5}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);padding:13px 20px;background:var(--bg-card);border:.5px solid var(--border-bright);border-radius:var(--radius);font-size:14px;color:var(--text);opacity:0;transition:all .25s;pointer-events:none;z-index:2000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:var(--danger);color:#FFB0B0}
.hidden{display:none !important}
</style>
</head>
<body>

<div class="container">
  <div style="margin-bottom:1.2rem">
    <div class="page-title">💰 Meu Financeiro</div>
    <div class="page-sub" id="pgSub">Quanto você vendeu e recebeu.</div>
  </div>

  <!-- Filtro -->
  <div class="card">
    <div class="fin-mode-toggle">
      <button class="fin-mode-btn active" data-mode="dia" onclick="setMode('dia')">Hoje</button>
      <button class="fin-mode-btn" data-mode="ontem" onclick="setMode('ontem')">Ontem</button>
      <button class="fin-mode-btn" data-mode="semanaAnt" onclick="setMode('semanaAnt')">Semana anterior</button>
      <button class="fin-mode-btn greenbtn" data-mode="semana" onclick="setMode('semana')">Semana atual</button>
      <button class="fin-mode-btn" data-mode="mes" onclick="setMode('mes')">Mês</button>
      <button class="fin-mode-btn" data-mode="ano" onclick="setMode('ano')">Ano</button>
      <button class="fin-mode-btn" data-mode="custom" onclick="setMode('custom')">Período</button>
    </div>
    <div class="fin-nav" id="navBox"><button id="navPrev">‹</button><span class="lbl" id="navLabel">—</span><button id="navNext">›</button></div>
    <div class="fin-date-row hidden" id="customBox">
      <div class="f field"><label>De</label><input type="date" id="cFrom"/></div>
      <div class="f field"><label>Até</label><input type="date" id="cTo"/></div>
      <button class="btn-secondary" onclick="loadTudo()">Ver</button>
    </div>
  </div>

  <!-- Lucro diário do mês (caixa branca) + Acumulado da semana (caixa verde) -->
  <div id="monthBox"></div>
  <div id="weekBox"></div>

  <!-- Pix recebidos hoje (ao vivo) -->
  <div id="aovivoBox"></div>

  <!-- 1) Sua conta -->
  <div id="contaContainer"><div class="state-msg"><span class="icon">⏳</span><div>Carregando…</div></div></div>

  <!-- 2) Ranking -->
  <div class="card"><div class="card-title">🏆 Ranking da equipe</div><div id="rankContainer"><div class="state-msg"><span class="icon">⏳</span><div>Carregando…</div></div></div></div>

  <!-- 3) Meus recebimentos -->
  <div id="recContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL='https://lux-figurinhas.plataformalux.workers.dev';
let meuNome='', mode='dia', ref=new Date(), curFrom='', curTo='';

window.addEventListener('DOMContentLoaded', init);
async function init(){
  try{ const r=await window.__luxFetch(WORKER_URL+'/admin/me'); const d=await r.json(); if(d.ok){ meuNome=d.user.name||d.user.email; document.getElementById('pgSub').textContent='Olá, '+meuNome+' — aqui está quanto você vendeu e recebeu.'; } }catch(e){}
  document.getElementById('navPrev').addEventListener('click',()=>step(-1));
  document.getElementById('navNext').addEventListener('click',()=>step(1));
  loadWeek();        // caixa verde da semana (sempre a semana atual sáb→sex)
  loadMonthWhite();  // caixa branca do mês (lucro diário, sempre o mês atual)
  aovivoStart();     // Pix recebidos hoje, em tempo real
  setMode('dia');
}

// ── caixa verde: acumulado da semana (sáb→sex) com gráfico ──
async function loadWeek(){
  try{
    const wk=semanaSabSex(new Date());
    const from=ymd(wk[0]), to=ymd(wk[1]);
    const r=await window.__luxFetch(`${WORKER_URL}/financeiro/me?from=${from}&to=${to}`);
    const d=await r.json();
    if(d.ok) renderWeek(d.me, wk[0], wk[1]);
  }catch(_){}
}
function renderWeek(me, sab, sex){
  const box=document.getElementById('weekBox');
  // 7 dias: sáb..sex
  const datas=[]; let dd=new Date(sab); for(let i=0;i<7;i++){ datas.push(ymd(dd)); dd.setDate(dd.getDate()+1); }
  const mapa={}; (me.dias||[]).forEach(x=>mapa[x.data]=x.liquidoBRL||0);
  const diarios=datas.map(dt=>mapa[dt]||0);
  let cum=0; const acum=diarios.map(v=>{ cum+=v; return cum; });
  const total=cum;
  const W=320,H=96,P=12, maxV=Math.max(...acum,1);
  const xs=i=>P+i*(W-2*P)/6;
  const ys=v=>H-P-(v/maxV)*(H-2*P);
  const pts=acum.map((v,i)=>`${xs(i).toFixed(1)},${ys(v).toFixed(1)}`).join(' ');
  const area=`${xs(0).toFixed(1)},${H-P} ${pts} ${xs(6).toFixed(1)},${H-P}`;
  const dots=acum.map((v,i)=>`<circle cx="${xs(i).toFixed(1)}" cy="${ys(v).toFixed(1)}" r="3.2" fill="#eafaea" stroke="#7FB87A" stroke-width="1.5"/>`).join('');
  const L=['Sáb','Dom','Seg','Ter','Qua','Qui','Sex'];
  box.innerHTML=`<div class="week-card">
    <div class="week-label">Acumulado da semana · ${fmtDBR(ymd(sab))} a ${fmtDBR(ymd(sex))}</div>
    <div class="week-value">${fmtBRL(total)}</div>
    <svg class="week-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(127,184,122,.45)"/><stop offset="100%" stop-color="rgba(127,184,122,0)"/></linearGradient></defs>
      <polygon points="${area}" fill="url(#wg)"/>
      <polyline points="${pts}" fill="none" stroke="#9be79a" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
    </svg>
    <div class="week-days">${L.map(l=>`<span>${l}</span>`).join('')}</div>
  </div>`;
}
// ── caixa branca: lucro diário do mês (sempre o mês atual, igual ao admin — gráfico de linha) ──
async function loadMonthWhite(){
  try{
    const now=new Date();
    const s=new Date(now.getFullYear(),now.getMonth(),1), e=new Date(now.getFullYear(),now.getMonth()+1,0);
    const r=await window.__luxFetch(`${WORKER_URL}/financeiro/me?from=${ymd(s)}&to=${ymd(e)}`);
    const d=await r.json();
    if(d.ok) renderMonthWhite(d.me, s, e);
  }catch(_){}
}
function renderMonthWhite(me, start, end){
  const box=document.getElementById('monthBox'); if(!box) return;
  const nDays=end.getDate();
  const datas=[]; for(let i=1;i<=nDays;i++){ datas.push(ymd(new Date(start.getFullYear(),start.getMonth(),i))); }
  const mapa={}; (me.dias||[]).forEach(x=>mapa[x.data]=x.liquidoBRL||0);
  const diarios=datas.map(dt=>mapa[dt]||0);
  const total=diarios.reduce((s,v)=>s+v,0);
  const W=320,H=96,P=12, maxV=Math.max(...diarios,1);
  const slotW=(W-2*P)/nDays, barW=Math.max(1.5, slotW*0.62), chartH=H-2*P;
  const bars=diarios.map((v,i)=>{ const h=Math.max(0,(v/maxV)*chartH); const x=P+i*slotW+(slotW-barW)/2; return `<rect x="${x.toFixed(1)}" y="${(H-P-h).toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" fill="#ffffff" opacity=".9"/>`; }).join('');
  const MES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][start.getMonth()];
  const WD=['dom','seg','ter','qua','qui','sex','sáb'];
  let dayLabels=''; for(let i=1;i<=nDays;i++){ const wd=WD[new Date(start.getFullYear(),start.getMonth(),i).getDay()]; dayLabels+=`<span>${i}<i>${wd}</i></span>`; }
  const grid=[0,.25,.5,.75,1].map(f=>{ const y=(H-P-f*chartH).toFixed(1); return `<line x1="${P}" y1="${y}" x2="${W-P}" y2="${y}" stroke="rgba(255,255,255,.22)" stroke-width="1.5"/>`; }).join('');
  box.innerHTML=`<div class="month-card">
    <div class="month-label">Lucro Mensal · ${MES} ${start.getFullYear()}</div>
    <div class="month-value">${fmtBRL(total)} <span class="mv-sub">no mês</span></div>
    <svg class="week-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${grid}${bars}</svg>
    <div class="month-days">${dayLabels}</div>
  </div>`;
}
function fmtBRL(v){ return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDBR(s){ return s ? s.split('-').reverse().join('/') : '—'; }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg,type='info'){ const el=document.getElementById('toast'); el.className='toast show '+type; el.textContent=msg; clearTimeout(window.__tt); window.__tt=setTimeout(()=>el.classList.remove('show'),3200); }

function setMode(m){ mode=m; document.querySelectorAll('.fin-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m)); document.getElementById('customBox').classList.toggle('hidden',m!=='custom'); document.getElementById('navBox').classList.toggle('hidden',m==='custom'); if(m!=='custom'){ ref=new Date(); if(m==='ontem') ref.setDate(ref.getDate()-1); if(m==='semanaAnt') ref.setDate(ref.getDate()-7); loadTudo(); } }
function semanaSabSex(r){ const d=new Date(r),dow=d.getDay(),dd=(dow+1)%7; const s=new Date(d); s.setDate(d.getDate()-dd); const e=new Date(s); e.setDate(s.getDate()+6); return [s,e]; }
function rangeFor(m,r){
  if(m==='dia') return [ymd(r),ymd(r),'Hoje · '+fmtDBR(ymd(r))];
  if(m==='ontem') return [ymd(r),ymd(r),'Ontem · '+fmtDBR(ymd(r))];
  if(m==='semana'||m==='semanaAnt'){ const x=semanaSabSex(r); const pre=m==='semanaAnt'?'Semana anterior · ':'Semana atual · '; return [ymd(x[0]),ymd(x[1]),`${pre}${fmtDBR(ymd(x[0]))} a ${fmtDBR(ymd(x[1]))}`]; }
  if(m==='mes'){ const s=new Date(r.getFullYear(),r.getMonth(),1),e=new Date(r.getFullYear(),r.getMonth()+1,0); const M=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']; return [ymd(s),ymd(e),`${M[r.getMonth()]} ${r.getFullYear()}`]; }
  if(m==='ano') return [`${r.getFullYear()}-01-01`,`${r.getFullYear()}-12-31`,`Ano ${r.getFullYear()}`];
  return [document.getElementById('cFrom').value,document.getElementById('cTo').value,''];
}
function step(dir){ if(mode==='dia'||mode==='ontem')ref.setDate(ref.getDate()+dir); else if(mode==='semana'||mode==='semanaAnt')ref.setDate(ref.getDate()+7*dir); else if(mode==='mes')ref.setMonth(ref.getMonth()+dir); else if(mode==='ano')ref.setFullYear(ref.getFullYear()+dir); loadTudo(); }
async function loadTudo(){ const rg=rangeFor(mode,ref); curFrom=rg[0]; curTo=rg[1]; if(!curFrom||!curTo){ toast('Escolha as datas.','error'); return; } document.getElementById('navLabel').textContent=rg[2]||`${fmtDBR(curFrom)} a ${fmtDBR(curTo)}`; await Promise.all([loadMe(),loadRanking()]); }

async function loadMe(){
  const cont=document.getElementById('contaContainer'); cont.innerHTML='<div class="state-msg"><span class="icon">⏳</span><div>Carregando…</div></div>';
  document.getElementById('recContainer').innerHTML='';
  try{ const r=await window.__luxFetch(`${WORKER_URL}/financeiro/me?from=${curFrom}&to=${curTo}`); const d=await r.json(); if(!d.ok) throw new Error(d.error||'Erro'); renderConta(d.me); renderRecebimentos(d.recebimentos||[]); }
  catch(err){ cont.innerHTML=`<div class="state-msg"><span class="icon">⚠️</span><div>${escapeHtml(err.message)}</div></div>`; }
}
function renderConta(me){
  const cont=document.getElementById('contaContainer');
  const dias=(me.dias||[]).filter(x=>x.entradaBRL>0||x.liquidoBRL!==0);
  const resultado=(me.entradaBRL||0)-(me.impostoBRL||0)-(me.anuncioBRL||0)-(me.custoIaBRL||0);
  const mp=me.mercadoPagoBRL||0, diverso=me.diversoBRL||0, dLabel=me.diversoLabel||'diversas';
  const pix=(me.pixBRL!=null?me.pixBRL:((me.entradaBRL||0)-mp-diverso));
  const showCompo=(mp>0||diverso!==0);
  let html=`
    <div class="card"><div class="card-title">Sua conta</div>
      <div class="breakdown">
        <div class="bd-row"><span class="k">🟢 Entrada (vendas)</span><span class="v">${fmtBRL(me.entradaBRL)}</span></div>
        ${showCompo?`<div class="bd-row inc"><span class="k">↳ PIX</span><span class="v">${fmtBRL(pix)}</span></div>`:''}
        ${mp>0?`<div class="bd-row inc"><span class="k">↳ 💳 Mercado Pago <small>(já somado)</small></span><span class="v">${fmtBRL(mp)}</span></div>`:''}
        ${diverso!==0?`<div class="bd-row inc"><span class="k">↳ ${escapeHtml(dLabel)} <small>(já somado)</small></span><span class="v">${diverso<0?'− ':'+ '}${fmtBRL(Math.abs(diverso))}</span></div>`:''}
        <div class="bd-row neg"><span class="k">➖ Imposto (6%)</span><span class="v">- ${fmtBRL(me.impostoBRL)}</span></div>
        <div class="bd-row neg"><span class="k">➖ Anúncio</span><span class="v">- ${fmtBRL(me.anuncioBRL)}</span></div>
        <div class="bd-row neg"><span class="k">➖ Plataforma</span><span class="v">- ${fmtBRL(me.custoIaBRL)}</span></div>
        <div class="bd-row sub"><span class="k">= Resultado</span><span class="v">${fmtBRL(resultado)}</span></div>
        <div class="bd-note">➗ sua parte (metade)</div>
        <div class="bd-row final"><span class="k">Lucro líquido</span><span class="v">${fmtBRL(me.liquidoBRL)}</span></div>
      </div>`;
  if(dias.length){
    html+=`<div class="day-toggle"><button onclick="document.getElementById('dayList').classList.toggle('show')">▾ ver dia a dia (${dias.length})</button></div>
      <div class="day-list" id="dayList">${dias.map(x=>`<div class="day-item"><span class="d">${fmtDBR(x.data)}</span><span class="ent">vendas ${fmtBRL(x.entradaBRL)}</span><span class="liq">${fmtBRL(x.liquidoBRL)}</span></div>`).join('')}</div>`;
  }
  html+=`</div>`;
  cont.innerHTML=html;
}
function renderRecebimentos(recebimentos){
  const cont=document.getElementById('recContainer');
  let html=`<div class="card"><div class="card-title">🧾 Meus recebimentos (${recebimentos.length})</div>`;
  if(recebimentos.length){
    html+=`<div class="rec-box"><div class="rec-item head"><span>Nome</span><span>Data</span><span>Hora</span><span>Valor</span></div>`;
    html+=recebimentos.map(t=>`<div class="rec-item"><div class="rn">${escapeHtml(t.nome||'(sem nome)')}</div><div class="rd">${fmtDBR(t.data)}</div><div class="rh">${escapeHtml(t.hora||'')}</div><div class="rv">${fmtBRL(t.valorBRL)}</div></div>`).join('');
    html+=`</div>`;
  } else {
    html+=`<div class="state-msg" style="padding:1.6rem 1rem"><div>Nenhum recebimento neste período.</div></div>`;
  }
  html+=`</div>`;
  cont.innerHTML=html;
}

const FRASES={1:'🏆 Você é o nº 1! Performance espetacular — a equipe inteira se inspira em você. Obrigado por puxar o time pra cima!',2:'🥈 Quase lá! Você está voando — falta pouquíssimo pro topo. Orgulho da equipe!',3:'🥉 Pódio merecido! Sua consistência faz diferença. Bora subir mais um degrau!'};
const FRASE_ULTIMO='Essa rodada foi mais dura, mas é só uma fase. Você tem talento de sobra — bora virar esse jogo juntos. Conte com a gente! 💪';
const MEDALHA={1:'🥇',2:'🥈',3:'🥉'};
async function loadRanking(){
  const cont=document.getElementById('rankContainer'); cont.innerHTML='<div class="state-msg"><span class="icon">⏳</span><div>Carregando…</div></div>';
  try{ const r=await window.__luxFetch(`${WORKER_URL}/financeiro/ranking?from=${curFrom}&to=${curTo}`); const d=await r.json(); if(!d.ok) throw new Error(d.error||'Erro'); renderRanking(d); }
  catch(err){ cont.innerHTML=`<div class="state-msg"><span class="icon">⚠️</span><div>${escapeHtml(err.message)}</div></div>`; }
}
function renderRanking(d){
  const cont=document.getElementById('rankContainer'); const rk=d.ranking||[];
  if(!rk.length){ cont.innerHTML='<div class="state-msg"><div>Ainda não há vendas neste período.</div></div>'; return; }
  const eu=d.eu; let html='';
  if(eu){
    if(eu.top) html+=`<div class="trophy-card t${eu.top}"><div class="trophy-emoji">${MEDALHA[eu.top]}</div><div class="trophy-pos">${eu.top}º lugar</div><div class="trophy-msg">${FRASES[eu.top]}</div>${eu.valorBRL!=null?`<div class="trophy-val">Lucro de ${fmtBRL(eu.valorBRL)}${eu.dupla&&eu.valorTotalBRL!=null?` <span style="font-size:15px;opacity:.85">(total ${fmtBRL(eu.valorTotalBRL)})</span>`:''}</div>`:''}</div>`;
    else if(eu.ehUltimo) html+=`<div class="trophy-card last"><div class="trophy-emoji">🌱</div><div class="trophy-pos">Você está em ${eu.pos}º</div><div class="trophy-msg">${FRASE_ULTIMO}</div></div>`;
    else html+=`<div class="trophy-card"><div class="trophy-emoji">🎯</div><div class="trophy-pos">Você está em ${eu.pos}º de ${d.total}</div><div class="trophy-msg">Tá no caminho! Cada venda te aproxima do pódio. Bora pra cima! 🚀</div></div>`;
  }
  html+='<div class="rank-list">';
  rk.forEach(x=>{
    const medal=x.top?`<span class="rank-medal">${MEDALHA[x.top]}</span>`:'';
    const val=(x.valorBRL!=null)
      ? `<span class="rank-val">${fmtBRL(x.valorBRL)}${x.dupla&&x.valorTotalBRL!=null?` <small>(total ${fmtBRL(x.valorTotalBRL)})</small>`:''}</span>`
      : '';
    const tag=x.dupla?'<span class="dupla-tag">dupla</span>':'';
    html+=`<div class="rank-row${x.ehMeu?' me':''}"><div class="rank-pos">${x.pos}</div><div class="rank-name">${escapeHtml(x.nome)}${tag}${x.ehMeu?'<span class="you">(você)</span>':''}</div>${medal}${val}</div>`;
  });
  html+='</div>';
  cont.innerHTML=html;
}

// ── Pix ao vivo (meus recebimentos de hoje, em tempo real) ──
let aovivoTimer=null, aovivoLoading=false;
function aovivoStart(){ aovivoLoad(); if(aovivoTimer) clearInterval(aovivoTimer); aovivoTimer=setInterval(aovivoLoad,15000); }
async function aovivoLoad(){
  if(aovivoLoading) return; aovivoLoading=true;
  try{
    const r=await window.__luxFetch(WORKER_URL+'/sicredi/aovivo'); const d=await r.json();
    if(d.ok) aovivoRender(d);
  }catch(e){ /* silencioso */ }
  finally{ aovivoLoading=false; }
}
function aovivoRender(d){
  const box=document.getElementById('aovivoBox'); if(!box) return;
  const meu=(d.atendentes||[])[0];   // a rota já devolve só os meus
  const total=meu?meu.totalBRL:0, qtd=meu?meu.qtd:0;
  const recs=(meu&&meu.recebimentos)?meu.recebimentos.slice().sort((a,b)=>String(b.hora||'').localeCompare(String(a.hora||''))):[];
  const p2=n=>String(n).padStart(2,'0'), now=new Date();
  let html=`<div class="card" style="border-color:rgba(127,184,122,.4)">
    <div class="card-title">💸 Pix de hoje <span style="font-family:'DM Sans';letter-spacing:0;text-transform:none;font-size:12px;color:var(--text-dim);font-weight:400;margin-left:auto">ao vivo · ${p2(now.getHours())}:${p2(now.getMinutes())}</span></div>
    <div class="bd-row final" style="margin-bottom:10px"><span class="k">${qtd} Pix hoje</span><span class="v">${fmtBRL(total)}</span></div>`;
  if(recs.length){
    html+=`<div class="rec-box"><div class="rec-item head" style="grid-template-columns:1fr auto"><span>Horário</span><span>Valor</span></div>`;
    html+=recs.map(t=>`<div class="rec-item" style="grid-template-columns:1fr auto"><div class="rh" style="text-align:left">${escapeHtml(t.hora||'')}</div><div class="rv">${fmtBRL(t.valorBRL)}</div></div>`).join('');
    html+=`</div>`;
  } else {
    html+=`<div class="state-msg" style="padding:1.4rem 1rem"><span class="icon">⏳</span><div>Nenhum Pix ainda hoje. Quando cair, aparece aqui sozinho.</div></div>`;
  }
  html+=`</div>`;
  box.innerHTML=html;
}
</script>
