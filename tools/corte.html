<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Corte — Plataforma Lux</title>

<script src="../js/auth-iframe.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #C9A84C;
    --gold-bright: #E2BA5F;
    --gold-dim: #9A7A38;
    --bg: #0A0A0B;
    --bg2: #111114;
    --bg3: #18181C;
    --bg4: #1F1F25;
    --text: #E8E4DC;
    --text-dim: #8A8680;
    --border: rgba(201,168,76,.2);
    --border-bright: rgba(201,168,76,.4);
    --green: #7FB87A;
    --red: #E87A7A;
    --amber: #E8A84C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
  }
  body {
    background: radial-gradient(ellipse at top, rgba(201,168,76,.04) 0%, var(--bg) 60%);
    padding: 20px 14px 60px;
  }
  .container { max-width: 760px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .header .icon-wrap { font-size: 36px; margin-bottom: 6px; }
  .header h1 { font-family: 'Cinzel', Georgia, serif; color: var(--gold); font-size: 24px; letter-spacing: .1em; margin-bottom: 4px; }
  .header .sub { color: var(--text-dim); font-size: 12px; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .card h2 {
    color: var(--gold-bright);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ─── Upload ─── */
  .upload-zone {
    border: 2px dashed var(--border-bright);
    border-radius: 10px;
    padding: 28px 14px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    background: rgba(255,255,255,.02);
    display: block;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--gold);
    background: rgba(201,168,76,.05);
  }
  .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
  .upload-zone .text { color: var(--text); font-size: 14px; }
  .upload-zone .text strong { color: var(--gold-dim); }
  .upload-zone .hint { color: var(--text-dim); font-size: 11px; margin-top: 6px; }
  .upload-zone input { display: none; }

  /* ─── Waveform ─── */
  .wave-wrap {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 12px;
  }
  #waveCanvas {
    display: block;
    width: 100%;
    height: 120px;
    background: var(--bg);
    border-radius: 6px;
    cursor: crosshair;
    touch-action: none;
  }
  .wave-hint {
    font-size: 12px;
    color: var(--text-mid, #8a8680);
    text-align: center;
    margin-top: 8px;
    letter-spacing: .01em;
  }
  .wave-times {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 14px;
    color: var(--gold-bright);
    font-weight: 600;
    letter-spacing: .02em;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Slider duplo (início + fim) ─── */
  .range-wrap {
    position: relative;
    height: 32px;
    margin-top: 10px;
  }
  .range-wrap .track {
    position: absolute;
    top: 14px;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--bg4);
    border-radius: 2px;
  }
  .range-wrap .range-fill {
    position: absolute;
    top: 14px;
    height: 4px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 100%);
    border-radius: 2px;
  }
  .range-wrap input[type=range] {
    position: absolute;
    top: 4px;
    left: 0;
    width: 100%;
    height: 24px;
    background: transparent;
    pointer-events: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .range-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    pointer-events: auto;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--gold-bright);
    border: 2px solid var(--bg2);
    cursor: grab;
    box-shadow: 0 2px 6px rgba(201,168,76,.4);
  }
  .range-wrap input[type=range]::-moz-range-thumb {
    pointer-events: auto;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--gold-bright);
    border: 2px solid var(--bg2);
    cursor: grab;
    box-shadow: 0 2px 6px rgba(201,168,76,.4);
  }

  /* ─── Sliders simples (fade) ─── */
  .control-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg3);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .control-row .label {
    font-size: 13px;
    color: var(--text);
    flex: 0 0 110px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .control-row .slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: linear-gradient(90deg, var(--gold-dim) 0%, var(--gold) 100%);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .control-row .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--gold-bright);
    border: 2px solid var(--bg2);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(201,168,76,.4);
  }
  .control-row .slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--gold-bright);
    border: 2px solid var(--bg2);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(201,168,76,.4);
  }
  .control-row .val {
    flex: 0 0 60px;
    text-align: right;
    color: var(--gold-bright);
    font-weight: 600;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Botões ─── */
  .btn-primary {
    width: 100%;
    padding: 14px 22px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 100%);
    border: none; border-radius: 10px;
    color: #1A1A1A;
    font-family: 'Cinzel', Georgia, serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: .14em;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform .1s, box-shadow .15s;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(201,168,76,.3);
  }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .btn-secondary {
    width: 100%;
    padding: 12px 18px;
    background: var(--bg4);
    border: 1px solid var(--border-bright);
    color: var(--gold-bright);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: all .15s;
  }
  .btn-secondary:hover { background: rgba(201,168,76,.08); }

  .btn-play {
    width: 100%;
    padding: 11px 16px;
    background: rgba(201,168,76,.08);
    border: 1px solid var(--border);
    color: var(--gold);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
    transition: all .15s;
  }
  .btn-play:hover { background: rgba(201,168,76,.16); }
  .btn-play.playing { background: var(--gold); color: #1A1A1A; }

  /* ─── Alertas ─── */
  .alert {
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .alert-info { background: rgba(201,168,76,.06); border-left: 3px solid var(--gold); color: var(--text); }
  .alert-error { background: rgba(232,122,122,.08); border-left: 3px solid var(--red); color: var(--text); }
  .alert-warn { background: rgba(232,168,76,.08); border-left: 3px solid var(--amber); color: var(--text); }

  /* ─── Progresso (export) ─── */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--bg4);
    border-radius: 4px;
    overflow: hidden;
    margin: 12px 0 4px;
  }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 100%);
    width: 0%;
    transition: width .3s ease;
  }
  .progress-detail {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ─── File info ─── */
  .file-info {
    background: var(--bg3);
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 12px;
    font-size: 13px;
    display: none;
  }
  .file-info.visible { display: block; }
  .file-info .row { display: flex; justify-content: space-between; padding: 2px 0; }
  .file-info .row .label { color: var(--text-dim); }

  /* esconder secoes */
  .hidden { display: none !important; }

  @media (max-width: 520px) {
    .header h1 { font-size: 20px; }
    .card { padding: 14px; }
    .control-row .label { flex: 0 0 90px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="icon-wrap">✂️</div>
    <h1>CORTE</h1>
    <div class="sub">Corte trechos da música com fade-in e fade-out suaves</div>
  </div>

  <!-- ─── Upload ─── -->
  <div class="card" id="cardUpload">
    <h2>📤 Selecione o áudio</h2>
    <label class="upload-zone" id="uploadZone">
      <div class="icon">🎵</div>
      <div class="text">Clique ou <strong>arraste o arquivo</strong> aqui</div>
      <div class="hint">MP3, WAV, M4A, OGG &middot; até 50MB</div>
      <input type="file" id="fileInput" accept="audio/*,.mp3,.wav,.m4a,.ogg">
    </label>
    <div class="file-info" id="fileInfo">
      <div class="row"><span class="label">📁 Arquivo:</span> <span id="fName">-</span></div>
      <div class="row"><span class="label">⏱ Duração:</span> <span id="fDuration">-</span></div>
    </div>
  </div>

  <!-- ─── Editor (waveform + cortes + fades) ─── -->
  <div class="card hidden" id="cardEditor">
    <h2>🎛️ Editor</h2>

    <div class="wave-wrap">
      <canvas id="waveCanvas"></canvas>
      <div class="wave-hint">🔊 Clique na onda pra ouvir dali — termina com fade-out no marcador de fim</div>
      <div class="wave-times">
        <span id="waveStart">0:00 (início)</span>
        <span id="waveEnd">0:00 (fim)</span>
      </div>

      <!-- Slider duplo (corte início/fim) -->
      <div class="range-wrap">
        <div class="track"></div>
        <div class="range-fill" id="rangeFill"></div>
        <input type="range" id="rangeStart" min="0" max="1000" value="0">
        <input type="range" id="rangeEnd"   min="0" max="1000" value="1000">
      </div>
    </div>

    <!-- Botão pré-visualizar logo abaixo do slider duplo -->
    <button class="btn-play" id="btnPreview" style="margin-top:14px">▶ Pré-visualizar resultado</button>

    <!-- Sliders de fade -->
    <div style="margin-top:14px">
      <div class="control-row">
        <span class="label">📈 Fade-in</span>
        <input type="range" class="slider" id="sliderFadeIn" min="0" max="100" step="1" value="20">
        <span class="val" id="valFadeIn">2.0s</span>
      </div>
      <div class="control-row">
        <span class="label">📉 Fade-out</span>
        <input type="range" class="slider" id="sliderFadeOut" min="0" max="100" step="1" value="30">
        <span class="val" id="valFadeOut">3.0s</span>
      </div>
    </div>
  </div>

  <!-- Fora da caixa Editor: progresso de export + botões finais -->
  <div id="exportSection" class="hidden">
    <div class="progress-bar hidden" id="exportProgressBar"><div class="fill" id="exportFill"></div></div>
    <div class="progress-detail hidden" id="exportDetail"></div>

    <button class="btn-primary" id="btnExport">⬇ Baixar MP3</button>
    <button class="btn-secondary" id="btnReset">+ Novo arquivo</button>
  </div>

  <div class="alert alert-error hidden" id="errorBox"></div>
</div>

<!-- Lib LameJS pra encoding MP3 (MIT, ~80KB).
     Usamos a build UMD do cdnjs (Cloudflare) que expõe `window.lamejs`
     direto via <script> sem precisar de import. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>

<script>
'use strict';

// ============================================================
// Estado global
// ============================================================
let audioBuffer = null;        // AudioBuffer do arquivo original (decodificado)
let originalFilename = 'audio';
let previewSource = null;      // AudioBufferSourceNode atual (pra parar)
let previewCtx = null;
let isPlaying = false;
let previewRAF = null;         // requestAnimationFrame do playhead do preview

// Playback livre (clica na waveform e ouve dali em diante)
let freeSource = null;         // AudioBufferSourceNode do play livre
let freeCtx = null;            // AudioContext do play livre
let freeStartCtxTime = 0;      // ctx.currentTime no momento que começou
let freeStartOffset = 0;       // ponto (em segundos) de onde começou a tocar
let isPlayingFree = false;
let playheadPct = null;        // posição do cursor de reprodução (0..1), null = escondido
let playheadRAF = null;        // id do requestAnimationFrame

const $ = (id) => document.getElementById(id);

// ============================================================
// Helpers
// ============================================================
function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(2) + ' MB';
}
function fmtTime(s) {
  s = Math.max(0, Math.round(s));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${String(r).padStart(2, '0')}`;
}
function fmtTimeDecimal(s) {
  // 1.5s, 0:23.4, etc
  if (s < 60) return s.toFixed(1) + 's';
  const m = Math.floor(s / 60);
  const r = (s - m*60).toFixed(1);
  return `${m}:${String(r).padStart(4, '0')}`;
}
function showError(msg) {
  const box = $('errorBox');
  box.textContent = '❌ ' + msg;
  box.classList.remove('hidden');
  setTimeout(() => box.classList.add('hidden'), 8000);
}

// ============================================================
// UPLOAD
// ============================================================
const uploadZone = $('uploadZone');
const fileInput = $('fileInput');

uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

async function handleFile(file) {
  if (file.size > 50 * 1024 * 1024) {
    showError('Arquivo muito grande (máximo 50MB).');
    return;
  }
  originalFilename = file.name;
  $('fName').textContent = file.name;
  $('fileInfo').classList.add('visible');

  try {
    const arrayBuf = await file.arrayBuffer();
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    audioBuffer = await ctx.decodeAudioData(arrayBuf);
    ctx.close();

    $('fDuration').textContent = fmtTime(audioBuffer.duration);

    // Mostra editor
    $('cardEditor').classList.remove('hidden');
    $('exportSection').classList.remove('hidden');

    initEditor();
  } catch (err) {
    console.error('[corte] erro decode:', err);
    showError('Não consegui ler esse arquivo de áudio. Tente outro formato (MP3/WAV/M4A).');
  }
}

// ============================================================
// EDITOR — waveform + sliders sincronizados
// ============================================================
function initEditor() {
  drawWaveform();

  const duration = audioBuffer.duration;
  const STEPS = 1000; // resolução dos sliders (0-1000)

  // Sincroniza valores iniciais
  $('rangeStart').value = 0;
  $('rangeEnd').value = STEPS;

  // Atualiza tudo na primeira vez
  updateRanges();
  updateFades();

  // Listeners — slider duplo sobre waveform
  $('rangeStart').addEventListener('input', (e) => {
    let start = parseInt(e.target.value, 10);
    let end = parseInt($('rangeEnd').value, 10);
    if (start >= end - 10) start = end - 10; // garante pelo menos 1% de duração
    e.target.value = start;
    updateRanges();
    drawWaveform();
  });
  $('rangeEnd').addEventListener('input', (e) => {
    let end = parseInt(e.target.value, 10);
    let start = parseInt($('rangeStart').value, 10);
    if (end <= start + 10) end = start + 10;
    e.target.value = end;
    updateRanges();
    drawWaveform();
  });

  // Fades
  $('sliderFadeIn').addEventListener('input', updateFades);
  $('sliderFadeOut').addEventListener('input', updateFades);
}

function updateRanges() {
  const duration = audioBuffer.duration;
  const startPct = parseInt($('rangeStart').value, 10) / 1000;
  const endPct = parseInt($('rangeEnd').value, 10) / 1000;
  const startSec = startPct * duration;
  const endSec = endPct * duration;

  $('waveStart').textContent = fmtTime(startSec) + ' (início)';
  $('waveEnd').textContent = fmtTime(endSec) + ' (fim)';

  // Atualiza barra de preenchimento entre os handles
  const fill = $('rangeFill');
  fill.style.left = (startPct * 100) + '%';
  fill.style.width = ((endPct - startPct) * 100) + '%';
}

function updateFades() {
  // Valor 0-100 -> 0.0s a 10.0s
  const fadeIn  = parseInt($('sliderFadeIn').value, 10) / 10;
  const fadeOut = parseInt($('sliderFadeOut').value, 10) / 10;
  $('valFadeIn').textContent = fadeIn.toFixed(1) + 's';
  $('valFadeOut').textContent = fadeOut.toFixed(1) + 's';
}

function getCurrentValues() {
  const duration = audioBuffer.duration;
  const startSec = (parseInt($('rangeStart').value, 10) / 1000) * duration;
  const endSec = (parseInt($('rangeEnd').value, 10) / 1000) * duration;
  const fadeIn = parseInt($('sliderFadeIn').value, 10) / 10;
  const fadeOut = parseInt($('sliderFadeOut').value, 10) / 10;
  return { startSec, endSec, fadeIn, fadeOut };
}

// ============================================================
// WAVEFORM (canvas)
// ============================================================
function drawWaveform() {
  const canvas = $('waveCanvas');
  // Ajusta resolução pro DPR
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  ctx.clearRect(0, 0, w, h);

  // Fundo
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, w, h);

  if (!audioBuffer) return;

  // Pega canal 0 (ou mistura mono dos dois canais)
  const data = audioBuffer.getChannelData(0);
  const samplesPerPixel = Math.max(1, Math.floor(data.length / w));

  // Posições do corte
  const duration = audioBuffer.duration;
  const startPct = parseInt($('rangeStart').value, 10) / 1000;
  const endPct = parseInt($('rangeEnd').value, 10) / 1000;
  const startX = startPct * w;
  const endX = endPct * w;

  // Fundo da área cortada (cinza escuro)
  ctx.fillStyle = 'rgba(255,255,255,.02)';
  ctx.fillRect(0, 0, w, h);

  // Área SELECIONADA (entre início e fim) — fundo levemente dourado
  ctx.fillStyle = 'rgba(201,168,76,.06)';
  ctx.fillRect(startX, 0, endX - startX, h);

  // Desenha as barrinhas verticais da waveform
  const mid = h / 2;
  for (let x = 0; x < w; x++) {
    let min = 1.0, max = -1.0;
    const sampleStart = x * samplesPerPixel;
    const sampleEnd = Math.min(data.length, sampleStart + samplesPerPixel);
    for (let i = sampleStart; i < sampleEnd; i++) {
      const s = data[i];
      if (s < min) min = s;
      if (s > max) max = s;
    }

    const inSelection = (x >= startX && x <= endX);
    ctx.fillStyle = inSelection ? 'rgba(201,168,76,.7)' : 'rgba(138,134,128,.4)';
    const y1 = mid + min * (h * 0.45);
    const y2 = mid + max * (h * 0.45);
    ctx.fillRect(x, y1, 1, Math.max(1, y2 - y1));
  }

  // Linhas verticais nos pontos de corte — grossas e nítidas
  ctx.lineWidth = 4;
  ctx.lineCap = 'butt';
  // Linha de início (verde claro pra diferenciar visualmente)
  ctx.strokeStyle = '#E2BA5F';
  ctx.shadowColor = 'rgba(226,186,95,.9)';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(startX, 0); ctx.lineTo(startX, h);
  ctx.stroke();
  // Linha de fim (mesma cor pra coerência)
  ctx.beginPath();
  ctx.moveTo(endX, 0); ctx.lineTo(endX, h);
  ctx.stroke();
  ctx.shadowBlur = 0; // reseta sombra pra não vazar pra próximas chamadas

  // Playhead (cursor de reprodução) — linha branca fina
  if (playheadPct !== null) {
    const px = playheadPct * w;
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#ffffff';
    ctx.shadowColor = 'rgba(255,255,255,.8)';
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.moveTo(px, 0); ctx.lineTo(px, h);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Bolinha no topo da linha
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(px, 5, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Re-desenha quando a janela muda de tamanho
window.addEventListener('resize', () => { if (audioBuffer) drawWaveform(); });

// ============================================================
// PLAY LIVRE — clica na waveform e ouve dali em diante
// ============================================================
// Toca o áudio ORIGINAL a partir do ponto clicado (ignora marcadores
// de corte). Serve pra explorar a música e achar onde cortar.
// Um playhead branco mostra onde está tocando.

function pararPlayLivre() {
  try { if (freeSource) freeSource.stop(); } catch (e) {}
  if (freeCtx) { try { freeCtx.close(); } catch (e) {} }
  freeSource = null;
  freeCtx = null;
  isPlayingFree = false;
  if (playheadRAF) { cancelAnimationFrame(playheadRAF); playheadRAF = null; }
}

function tocarLivreDe(offsetSec) {
  if (!audioBuffer) return;

  // Para qualquer reprodução em andamento (preview ou play livre anterior)
  pararPlayLivre();
  if (isPlaying) stopPreview();

  const dur = audioBuffer.duration;
  const { startSec, endSec, fadeIn, fadeOut } = getCurrentValues();
  offsetSec = Math.max(0, Math.min(offsetSec, dur - 0.05));

  // Se clicou DEPOIS do marcador de fim, não tem o que tocar
  if (offsetSec >= endSec) {
    playheadPct = offsetSec / dur;
    drawWaveform();
    return;
  }

  freeCtx = new (window.AudioContext || window.webkitAudioContext)();
  freeSource = freeCtx.createBufferSource();
  freeSource.buffer = audioBuffer;     // áudio original
  // GainNode pra aplicar o fade-out em tempo real (sem reprocessar buffer)
  const gainNode = freeCtx.createGain();
  freeSource.connect(gainNode);
  gainNode.connect(freeCtx.destination);

  freeSource.onended = () => {
    if (isPlayingFree) {
      isPlayingFree = false;
      playheadPct = null;
      if (playheadRAF) { cancelAnimationFrame(playheadRAF); playheadRAF = null; }
      drawWaveform();
    }
  };

  // ── Agenda o fade-out pra terminar exatamente no marcador de fim ──
  // fadeOutStartSec = onde o fade-out começa (em segundos do áudio original)
  const now = freeCtx.currentTime;
  const playDuration = Math.max(0.05, endSec - offsetSec);

  if (fadeOut > 0) {
    const fadeOutStartSec = endSec - fadeOut;   // ponto onde o fade começa
    if (offsetSec >= fadeOutStartSec) {
      // Cliquei DENTRO da zona de fade-out → já começa com ganho reduzido
      // Proporção do quanto já passou do fade (0 = início do fade, 1 = fim)
      const prog = (offsetSec - fadeOutStartSec) / fadeOut;   // 0..1
      const startGain = Math.max(0, (1 - prog) * (1 - prog)); // curva x^2
      gainNode.gain.setValueAtTime(startGain, now);
      // Rampa até 0 no tempo restante
      const tempoRestante = endSec - offsetSec;
      gainNode.gain.linearRampToValueAtTime(0.0001, now + tempoRestante);
    } else {
      // Cliquei ANTES do fade-out → toca normal até o fade começar, depois desce
      const tempoAteFade = fadeOutStartSec - offsetSec;
      gainNode.gain.setValueAtTime(1, now);
      gainNode.gain.setValueAtTime(1, now + tempoAteFade);
      gainNode.gain.linearRampToValueAtTime(0.0001, now + tempoAteFade + fadeOut);
    }
  }

  freeSource.start(0, offsetSec, playDuration);
  freeStartCtxTime = freeCtx.currentTime;
  freeStartOffset = offsetSec;
  isPlayingFree = true;

  // Anima o playhead enquanto toca — para no marcador de fim
  const tick = () => {
    if (!isPlayingFree || !freeCtx) return;
    const elapsed = freeCtx.currentTime - freeStartCtxTime;
    const posSec = freeStartOffset + elapsed;
    playheadPct = Math.min(1, posSec / dur);
    drawWaveform();
    if (posSec >= endSec) {
      pararPlayLivre();
      playheadPct = endSec / dur;   // deixa o cursor parado no marcador de fim
      drawWaveform();
      return;
    }
    playheadRAF = requestAnimationFrame(tick);
  };
  playheadRAF = requestAnimationFrame(tick);
}

// Click na waveform → calcula posição e toca dali
function onWaveClick(clientX) {
  if (!audioBuffer) return;
  const canvas = $('waveCanvas');
  const rect = canvas.getBoundingClientRect();
  let pct = (clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));

  // Se clicou no MESMO ponto enquanto toca (tolerância), alterna pausa
  if (isPlayingFree) {
    pararPlayLivre();
    playheadPct = pct;        // deixa o cursor onde clicou
    drawWaveform();
    // Toca do novo ponto
    tocarLivreDe(pct * audioBuffer.duration);
    return;
  }

  tocarLivreDe(pct * audioBuffer.duration);
}

(function bindWaveClick() {
  const canvas = $('waveCanvas');
  if (!canvas) return;
  canvas.addEventListener('click', (e) => onWaveClick(e.clientX));
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches && e.touches[0]) {
      e.preventDefault();
      onWaveClick(e.touches[0].clientX);
    }
  }, { passive: false });
})();

// ============================================================
// PROCESSAMENTO — corte + fade
// ============================================================
// Aplica corte + fade-in (expo) + fade-out (expo) em um AudioBuffer.
// Retorna um NOVO AudioBuffer.
//
// Curva exponencial: y = x^2 (parecida com o que humanos percebem
// como "linear" no volume)
function processAudio(srcBuffer, startSec, endSec, fadeIn, fadeOut) {
  const sampleRate = srcBuffer.sampleRate;
  const numChannels = srcBuffer.numberOfChannels;

  const startSample = Math.floor(startSec * sampleRate);
  const endSample = Math.floor(endSec * sampleRate);
  const length = endSample - startSample;

  if (length <= 0) throw new Error('Seleção inválida (fim antes do início)');

  // Cria novo buffer
  const outCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(
    numChannels, length, sampleRate
  );
  const outBuffer = outCtx.createBuffer(numChannels, length, sampleRate);

  const fadeInSamples = Math.min(length, Math.floor(fadeIn * sampleRate));
  const fadeOutSamples = Math.min(length - fadeInSamples, Math.floor(fadeOut * sampleRate));

  for (let ch = 0; ch < numChannels; ch++) {
    const src = srcBuffer.getChannelData(ch);
    const out = outBuffer.getChannelData(ch);

    for (let i = 0; i < length; i++) {
      let sample = src[startSample + i] || 0;

      // Fade-in exponencial
      if (i < fadeInSamples) {
        const t = i / fadeInSamples;       // 0 -> 1
        const gain = t * t;                // x^2 (expo)
        sample *= gain;
      }

      // Fade-out exponencial
      const fadeOutStart = length - fadeOutSamples;
      if (i >= fadeOutStart && fadeOutSamples > 0) {
        const t = (length - i) / fadeOutSamples;  // 1 -> 0
        const gain = t * t;
        sample *= gain;
      }

      out[i] = sample;
    }
  }

  return outBuffer;
}

// ============================================================
// PREVIEW (toca o resultado)
// ============================================================
$('btnPreview').addEventListener('click', async () => {
  if (!audioBuffer) return;

  // Se já está tocando o preview, para
  if (isPlaying) {
    stopPreview();
    return;
  }

  // Para o play livre se estiver rolando (não pode tocar os 2 juntos)
  if (isPlayingFree) {
    pararPlayLivre();
    playheadPct = null;
    drawWaveform();
  }

  const { startSec, endSec, fadeIn, fadeOut } = getCurrentValues();

  try {
    const previewBuffer = processAudio(audioBuffer, startSec, endSec, fadeIn, fadeOut);

    previewCtx = new (window.AudioContext || window.webkitAudioContext)();
    previewSource = previewCtx.createBufferSource();
    previewSource.buffer = previewBuffer;
    previewSource.connect(previewCtx.destination);
    previewSource.onended = () => {
      isPlaying = false;
      $('btnPreview').textContent = '▶ Pré-visualizar resultado';
      $('btnPreview').classList.remove('playing');
      // Limpa o playhead ao terminar
      if (previewRAF) { cancelAnimationFrame(previewRAF); previewRAF = null; }
      playheadPct = null;
      drawWaveform();
    };
    previewSource.start(0);

    isPlaying = true;
    $('btnPreview').textContent = '⏹ Parar';
    $('btnPreview').classList.add('playing');

    // ── Playhead do preview: vai do marcador de início ao de fim ──
    const dur = audioBuffer.duration;
    const previewStartCtxTime = previewCtx.currentTime;
    const tickPreview = () => {
      if (!isPlaying || !previewCtx) return;
      const elapsed = previewCtx.currentTime - previewStartCtxTime;
      const posSec = startSec + elapsed;       // posição absoluta no áudio original
      playheadPct = Math.min(endSec / dur, posSec / dur);
      drawWaveform();
      if (posSec >= endSec) return;            // onended cuida da limpeza
      previewRAF = requestAnimationFrame(tickPreview);
    };
    previewRAF = requestAnimationFrame(tickPreview);
  } catch (err) {
    showError(err.message);
  }
});

function stopPreview() {
  try {
    if (previewSource) previewSource.stop();
  } catch (e) {}
  if (previewCtx) {
    try { previewCtx.close(); } catch (e) {}
  }
  previewSource = null;
  previewCtx = null;
  isPlaying = false;
  $('btnPreview').textContent = '▶ Pré-visualizar resultado';
  $('btnPreview').classList.remove('playing');
  // Limpa o playhead
  if (previewRAF) { cancelAnimationFrame(previewRAF); previewRAF = null; }
  playheadPct = null;
  drawWaveform();
}

// ============================================================
// EXPORT MP3 (via LameJS)
// ============================================================
$('btnExport').addEventListener('click', async () => {
  if (!audioBuffer) return;
  if (typeof lamejs === 'undefined') {
    showError('Encoder MP3 não carregou. Recarregue a página.');
    return;
  }

  // Para preview se estiver tocando
  if (isPlaying) stopPreview();

  const { startSec, endSec, fadeIn, fadeOut } = getCurrentValues();
  const exportBar = $('exportProgressBar');
  const exportFill = $('exportFill');
  const exportDetail = $('exportDetail');

  exportBar.classList.remove('hidden');
  exportDetail.classList.remove('hidden');
  exportFill.style.width = '5%';
  exportDetail.textContent = 'Processando áudio...';
  $('btnExport').disabled = true;

  try {
    // 1. Aplica corte+fade
    const processed = processAudio(audioBuffer, startSec, endSec, fadeIn, fadeOut);

    exportFill.style.width = '20%';
    exportDetail.textContent = 'Convertendo pra MP3...';
    await new Promise(r => setTimeout(r, 10)); // deixa UI repintar

    // 2. Encode MP3
    const mp3Blob = await encodeMP3(processed, (pct) => {
      const totalPct = 20 + (pct * 75); // 20% -> 95%
      exportFill.style.width = totalPct + '%';
      exportDetail.textContent = `Convertendo pra MP3... ${Math.round(pct*100)}%`;
    });

    exportFill.style.width = '100%';
    exportDetail.textContent = 'Pronto!';

    // 3. Baixa
    const baseName = originalFilename.replace(/\.[^.]+$/, '');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(mp3Blob);
    a.download = baseName + '_corte.mp3';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);

    setTimeout(() => {
      exportBar.classList.add('hidden');
      exportDetail.classList.add('hidden');
    }, 1500);
  } catch (err) {
    console.error('[export] erro:', err);
    showError('Erro ao exportar: ' + err.message);
    exportBar.classList.add('hidden');
    exportDetail.classList.add('hidden');
  } finally {
    $('btnExport').disabled = false;
  }
});

// ============================================================
// MP3 encoder (LameJS)
// ============================================================
async function encodeMP3(buffer, onProgress) {
  const sampleRate = buffer.sampleRate;
  const channels = buffer.numberOfChannels;
  const bitrate = 192;

  // LameJS quer Int16 PCM
  const left = floatTo16BitPCM(buffer.getChannelData(0));
  const right = channels > 1 ? floatTo16BitPCM(buffer.getChannelData(1)) : left;

  const mp3enc = new lamejs.Mp3Encoder(channels, sampleRate, bitrate);
  const mp3Data = [];

  const SAMPLE_BLOCK = 1152;
  const totalBlocks = Math.ceil(left.length / SAMPLE_BLOCK);
  let blocksDone = 0;

  for (let i = 0; i < left.length; i += SAMPLE_BLOCK) {
    const leftChunk = left.subarray(i, i + SAMPLE_BLOCK);
    const rightChunk = right.subarray(i, i + SAMPLE_BLOCK);

    let mp3buf;
    if (channels === 1) {
      mp3buf = mp3enc.encodeBuffer(leftChunk);
    } else {
      mp3buf = mp3enc.encodeBuffer(leftChunk, rightChunk);
    }
    if (mp3buf.length > 0) mp3Data.push(mp3buf);

    blocksDone++;
    // Reporta progresso a cada 50 blocos pra UI respirar
    if (blocksDone % 50 === 0) {
      if (onProgress) onProgress(blocksDone / totalBlocks);
      await new Promise(r => setTimeout(r, 0));
    }
  }

  const final = mp3enc.flush();
  if (final.length > 0) mp3Data.push(final);

  return new Blob(mp3Data, { type: 'audio/mpeg' });
}

function floatTo16BitPCM(float32) {
  const out = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++) {
    const s = Math.max(-1, Math.min(1, float32[i]));
    out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return out;
}

// ============================================================
// RESET
// ============================================================
$('btnReset').addEventListener('click', () => {
  if (isPlaying) stopPreview();
  pararPlayLivre();
  playheadPct = null;
  audioBuffer = null;
  originalFilename = 'audio';
  $('fileInfo').classList.remove('visible');
  $('fileInput').value = '';
  $('cardEditor').classList.add('hidden');
  $('exportSection').classList.add('hidden');
});

// ============================================================
// BOOT
// ============================================================
async function boot() {
  // Aguarda auth-iframe.js
  let tries = 0;
  while (!window.__luxFetch && tries < 30) {
    await new Promise(r => setTimeout(r, 100));
    tries++;
  }
  // Esta ferramenta nao chama nenhum Worker, mas auth-iframe.js
  // gerencia a sessao Firebase. Se nao tiver, mostra aviso mas
  // a ferramenta funciona offline normalmente.
  if (!window.__luxFetch) {
    console.warn('[corte] auth-iframe.js nao carregou; ferramenta offline-only');
  }

  // Aguarda lamejs carregar (vem do CDN externo, pode demorar ate 5s).
  // Se nao carregar do CDN primario, tenta um fallback automatico.
  let lameTries = 0;
  while (typeof lamejs === 'undefined' && lameTries < 50) {
    await new Promise(r => setTimeout(r, 100));
    lameTries++;
  }

  if (typeof lamejs === 'undefined') {
    console.warn('[corte] lamejs CDN primario falhou, tentando fallback...');
    // Fallback: carrega lamejs do unpkg
    const ok = await loadScript('https://unpkg.com/lamejs@1.2.1/lame.min.js');
    if (!ok || typeof lamejs === 'undefined') {
      showError('Encoder MP3 não carregou (CDN bloqueado). Recarregue a página.');
    } else {
      console.log('[corte] lamejs carregado via fallback unpkg');
    }
  } else {
    console.log('[corte] lamejs carregado em', (lameTries * 100), 'ms');
  }
}

// Helper pra carregar script dinamicamente com Promise
function loadScript(url) {
  return new Promise((resolve) => {
    const s = document.createElement('script');
    s.src = url;
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
}

boot();
</script>
