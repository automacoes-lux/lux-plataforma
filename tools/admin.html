<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lux — Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="../css/theme.css"/>

<script src="../js/auth-iframe.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg-card:#121212;
  --bg-input:#1C1C1C;
  --bg-hover:#222;
  --text-mid:#B0A080;
  --danger:#E87A7A;
  --danger-bg:rgba(220,60,60,0.1);
  --danger-border:rgba(220,60,60,0.3);
}

html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;font-size:16px;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%,rgba(201,168,76,0.07) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 110%,rgba(201,168,76,0.04) 0%,transparent 60%);
}
.container{max-width:980px;margin:0 auto;padding:2rem 1.5rem 5rem}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.6rem;flex-wrap:wrap;gap:14px}
.page-title{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.14em;color:var(--gold);font-weight:600}
.page-title small{display:inline-block;font-size:9px;padding:3px 8px;border-radius:30px;background:rgba(201,168,76,.15);color:var(--gold-dim);border:.5px solid var(--border);margin-left:6px;letter-spacing:.08em;vertical-align:middle}

.btn-primary{
  padding:11px 22px;background:var(--gold);color:#000;border:none;border-radius:var(--radius);
  font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:opacity .15s;
}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

.btn-secondary{
  padding:9px 16px;background:transparent;color:var(--text);
  border:.5px solid var(--border-bright);border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;
}
.btn-secondary:hover{background:var(--bg-hover);border-color:var(--gold)}

.card{background:var(--bg-card);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1.4rem;margin-bottom:1.1rem}
.card-title{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:#FFFFFF;letter-spacing:.14em;text-transform:uppercase;margin-bottom:1.4rem;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:.5px;background:linear-gradient(90deg,var(--border) 0%,transparent 100%)}

/* ── Loading / empty / error ── */
.state-msg{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 1rem;color:var(--text-dim);text-align:center;gap:10px;font-size:14px;
}
.state-msg .icon{font-size:32px;opacity:.5}

/* ── Tabela de usuários ── */
.users-list{display:flex;flex-direction:column;gap:8px}
.user-row{
  display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;
  padding:14px 16px;background:var(--bg-input);border:.5px solid var(--border);border-radius:var(--radius);
  transition:border-color .15s;
}
.user-row:hover{border-color:var(--border-bright)}
.user-info{min-width:0}
.user-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.user-email{font-size:12px;color:var(--text-dim);word-break:break-all}
.user-meta{font-size:10px;color:var(--text-muted);margin-top:4px;letter-spacing:.04em}

.role-badge{
  font-size:10px;padding:4px 10px;border-radius:30px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;white-space:nowrap;
}
.role-badge.admin{background:rgba(201,168,76,0.15);color:var(--gold);border:.5px solid rgba(201,168,76,0.4)}
.role-badge.atendente{background:rgba(120,160,180,0.12);color:#8AB4CC;border:.5px solid rgba(120,160,180,0.3)}

.user-actions{display:flex;gap:6px;align-items:center}
.btn-icon{
  width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;
  background:var(--bg-hover);border:.5px solid var(--border);border-radius:8px;
  color:var(--text-dim);cursor:pointer;font-size:14px;transition:all .15s;
}
.btn-icon:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}
.btn-icon.disabled{opacity:.2;cursor:not-allowed;pointer-events:none}

.you-tag{font-size:10px;color:var(--text-muted);font-style:italic;padding-right:6px}

@media(max-width:600px){
  .user-row{grid-template-columns:1fr auto;gap:10px;padding:12px 14px}
  .user-actions{grid-column:1/-1;justify-content:space-between;margin-top:6px;padding-top:10px;border-top:.5px dashed var(--border)}
}

/* ── Modal de adicionar ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--bg-card);border:.5px solid var(--border-bright);border-radius:var(--radius-lg);
  padding:1.8rem;width:100%;max-width:440px;animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.14em;color:var(--gold);font-weight:600;margin-bottom:1.3rem;text-transform:uppercase}
.field{margin-bottom:1rem}
.field label{font-size:11px;color:var(--gold-dim);display:block;margin-bottom:6px;letter-spacing:.14em;text-transform:uppercase;font-family:'Cinzel',serif;font-weight:600}
.field input,.field select{
  width:100%;padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;
  background:var(--bg-input);color:var(--text);
  border:.5px solid var(--border);border-radius:var(--radius);outline:none;transition:border-color .15s;
}
.field input:focus,.field select:focus{border-color:var(--border-bright);box-shadow:0 0 0 3px rgba(201,168,76,.07)}
.modal-buttons{display:flex;gap:10px;margin-top:1.4rem}
.modal-buttons button{flex:1}

/* ── Modal de confirmação delete ── */
.confirm-text{color:var(--text-mid);font-size:14px;margin-bottom:1.2rem;line-height:1.5}
.confirm-text strong{color:var(--text)}
.confirm-warning{
  padding:10px 14px;background:var(--danger-bg);border:.5px solid var(--danger-border);
  border-radius:var(--radius);color:var(--danger);font-size:12px;margin-bottom:1.4rem;
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:12px 20px;background:var(--bg-card);border:.5px solid var(--border-bright);
  border-radius:var(--radius);font-size:13px;color:var(--text);
  opacity:0;transition:all .25s;pointer-events:none;z-index:2000;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:#5EAD7E;color:#A9D9BD}
.toast.error{border-color:var(--danger);color:#FFB0B0}
.toast.info{border-color:var(--border-bright)}

</style>
</head>
<body>

<div class="container">

  <div class="page-header">
    <div class="page-title">
      ✦ Gestão de Usuários
      <small>ADMIN</small>
    </div>
    <button class="btn-primary" onclick="openAddModal()">+ Adicionar Usuário</button>
  </div>

  <div class="card">
    <div class="card-title">Usuários Cadastrados</div>
    <div id="usersContainer">
      <div class="state-msg">
        <span class="icon">⏳</span>
        <div>Carregando usuários…</div>
      </div>
    </div>
  </div>

</div>

<!-- ═══ MODAL ADICIONAR ═══ -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Novo Usuário</div>
    <div class="field">
      <label>Email</label>
      <input id="newEmail" type="email" placeholder="usuario@dominio.com" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Nome</label>
      <input id="newName" type="text" placeholder="Nome completo" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Role (perfil)</label>
      <select id="newRole">
        <option value="atendente">Atendente</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeAddModal()">Cancelar</button>
      <button class="btn-primary" id="btnSaveUser" onclick="saveUser()">Salvar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL DELETAR ═══ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-title">Confirmar Remoção</div>
    <div class="confirm-text">
      Remover <strong id="delTargetName">—</strong> (<span id="delTargetEmail">—</span>)?
    </div>
    <div class="confirm-warning">
      ⚠ A pessoa perde acesso imediatamente no próximo refresh dela.
    </div>
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeDeleteModal()">Cancelar</button>
      <button class="btn-primary" id="btnConfirmDelete" onclick="confirmDelete()" style="background:#E87A7A;color:#fff">Remover</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://lux-figurinhas.plataformalux.workers.dev';

let state = {
  currentUserEmail: null,   // email do usuário logado (vem do /admin/me)
  users:            [],
  deleteTarget:     null
};

window.addEventListener('DOMContentLoaded', init);

async function init() {
  try {
    // Primeiro pega quem sou eu (pra saber o próprio email — não deixa se auto-deletar)
    const meResp = await window.__luxFetch(WORKER_URL + '/admin/me');
    const meData = await meResp.json();
    if (!meData.ok) throw new Error(meData.error || 'Erro em /admin/me');
    state.currentUserEmail = meData.user.email;

    if (meData.user.role !== 'admin') {
      renderError('Acesso restrito a administradores.');
      return;
    }

    await loadUsers();
  } catch (err) {
    renderError('Falha ao iniciar: ' + err.message);
  }
}

async function loadUsers() {
  const container = document.getElementById('usersContainer');
  container.innerHTML = '<div class="state-msg"><span class="icon">⏳</span><div>Carregando…</div></div>';
  try {
    const resp = await window.__luxFetch(WORKER_URL + '/admin/users');
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Erro ao listar');
    state.users = data.users || [];
    renderUsers();
  } catch (err) {
    renderError('Falha ao listar usuários: ' + err.message);
  }
}

function renderUsers() {
  const container = document.getElementById('usersContainer');
  if (!state.users.length) {
    container.innerHTML = `
      <div class="state-msg">
        <span class="icon">👥</span>
        <div>Nenhum usuário cadastrado ainda.</div>
      </div>`;
    return;
  }

  const list = document.createElement('div');
  list.className = 'users-list';
  state.users.forEach(u => {
    const isYou = (u.email === state.currentUserEmail);
    const roleClass  = u.role === 'admin' ? 'admin' : 'atendente';
    const roleLabel  = u.role === 'admin' ? 'Admin' : 'Atendente';
    const createdAt  = u.createdAt ? formatDate(u.createdAt) : '—';

    const row = document.createElement('div');
    row.className = 'user-row';
    row.innerHTML = `
      <div class="user-info">
        <div class="user-name">${escapeHtml(u.name || u.email)}</div>
        <div class="user-email">${escapeHtml(u.email)}</div>
        <div class="user-meta">Cadastrado em ${createdAt}${u.createdBy ? ' por ' + escapeHtml(u.createdBy) : ''}</div>
      </div>
      <span class="role-badge ${roleClass}">${roleLabel}</span>
      <div class="user-actions">
        ${isYou
          ? '<span class="you-tag">(você)</span>'
          : `<button class="btn-icon" title="Remover" data-email="${escapeAttr(u.email)}" data-name="${escapeAttr(u.name || u.email)}">✕</button>`
        }
      </div>
    `;
    if (!isYou) {
      row.querySelector('.btn-icon').addEventListener('click', (e) => {
        const btn = e.currentTarget;
        openDeleteModal(btn.dataset.email, btn.dataset.name);
      });
    }
    list.appendChild(row);
  });

  container.innerHTML = '';
  container.appendChild(list);
}

function renderError(msg) {
  const container = document.getElementById('usersContainer');
  container.innerHTML = `
    <div class="state-msg">
      <span class="icon">⚠</span>
      <div style="color:#E87A7A">${escapeHtml(msg)}</div>
    </div>`;
}

// ═══ MODAL ADICIONAR ═══
function openAddModal() {
  document.getElementById('newEmail').value = '';
  document.getElementById('newName').value  = '';
  document.getElementById('newRole').value  = 'atendente';
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('newEmail').focus(), 100);
}
function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
}
async function saveUser() {
  const email = document.getElementById('newEmail').value.trim().toLowerCase();
  const name  = document.getElementById('newName').value.trim();
  const role  = document.getElementById('newRole').value;

  if (!email) return toast('Email é obrigatório.', 'error');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return toast('Email inválido.', 'error');
  if (!name) return toast('Nome é obrigatório.', 'error');

  const btn = document.getElementById('btnSaveUser');
  btn.disabled = true; btn.textContent = 'Salvando…';
  try {
    const resp = await window.__luxFetch(WORKER_URL + '/admin/users', {
      method: 'POST',
      body: JSON.stringify({ email, name, role })
    });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Erro ao salvar');

    closeAddModal();
    toast(data.action === 'created' ? '✓ Usuário cadastrado!' : '✓ Usuário atualizado!', 'success');
    await loadUsers();
  } catch (err) {
    toast('Erro: ' + err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Salvar';
  }
}

// ═══ MODAL DELETAR ═══
function openDeleteModal(email, name) {
  state.deleteTarget = email;
  document.getElementById('delTargetName').textContent  = name;
  document.getElementById('delTargetEmail').textContent = email;
  document.getElementById('deleteModal').classList.add('show');
}
function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('show');
  state.deleteTarget = null;
}
async function confirmDelete() {
  if (!state.deleteTarget) return;
  const btn = document.getElementById('btnConfirmDelete');
  btn.disabled = true; btn.textContent = 'Removendo…';
  try {
    const resp = await window.__luxFetch(WORKER_URL + '/admin/users?email=' + encodeURIComponent(state.deleteTarget), {
      method: 'DELETE'
    });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Erro ao remover');
    closeDeleteModal();
    toast('✓ Usuário removido.', 'success');
    await loadUsers();
  } catch (err) {
    toast('Erro: ' + err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Remover';
  }
}

// ═══ HELPERS ═══
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.className = 'toast show ' + type;
  el.textContent = msg;
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  } catch (e) { return iso; }
}
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function escapeAttr(s) {
  return String(s||'').replace(/"/g,'&quot;');
}

</script>
</body>
</html>
